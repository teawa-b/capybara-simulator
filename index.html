    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            position: fixed; top: 0; left: 0; right: 0; bottom: 0;

<body>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Model actual sizes from inspection:
        // palm-trees: 25.91x5.28x5.24 (cluster of palms, huge)
        // tree1: 4.06x9.43x4.24 (single round tree)
        // tree2: 3.83x9.44x3.76 (single round tree)
        // trees: 24.93x6.87x3.00 (tree cluster, wide)
        // grass-turf: 1.84x0.51x0.50 (tiny)
        // flower: 0.91x2.07x0.88 (single flower ~2m tall at scale 1)
        // rocks: 7.28x2.15x1.32 (rock cluster, wide and flat)
        // rock2: 3.42x2.32x3.48 (single rock)

        class CapybaraSimulator {
            constructor() {
                this._isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
                this.renderer = new THREE.WebGLRenderer({
                    antialias: !this._isMobile,
                    powerPreference: 'high-performance',
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, this._isMobile ? 1.5 : 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = this._isMobile ? THREE.BasicShadowMap : THREE.PCFShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xc8dce8);
                this.scene.fog = new THREE.FogExp2(0xc5d8c5, 0.014); // atmospheric but can see background

                // Camera: low angle revolving around capybara (matching reference)
                this.camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);

                // Orbit params: capybara is at origin, camera revolves around her
                this.orbitRadius = 5;
                this.orbitHeight = 1.3; // low angle like reference
                this.orbitSpeed = 0.08; // slow, cinematic
                this.orbitAngle = 0;
                this.orbitTarget = new THREE.Vector3(0, 0.5, 0); // capybara center

                // 3/4 view from her right, slightly above
                this.camera.position.set(3.5, 1.8, 4);
                this.camera.lookAt(this.orbitTarget);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.target.copy(this.orbitTarget);
                this.controls.maxPolarAngle = Math.PI / 2.05;
                this.controls.minPolarAngle = Math.PI / 4;
                this.controls.minDistance = 3;
                this.controls.maxDistance = 15;
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.autoRotate = false;

                this.clock = new THREE.Clock();
                this.models = {};
                this.loadedCount = 0;
                this.totalModels = 0; // set dynamically in loadModels()
                this._instancedFlowers = null;
                this.capybara = null;
                this.mixer = null;

                // Hat system
                this.hatModels = [];
                this.currentHatIndex = -1; // -1 = no hat
                this.currentHatMesh = null;
                this._capyHeadBone = null;
                this._currentHatCfg = null;
                this._hatsEnabled = true;
                this._hatFollowPos = new THREE.Vector3();
                this._hatFollowQuat = new THREE.Quaternion();
                this._hatOffset = new THREE.Vector3();
                // Correction: bone local +Y = world +Z (forward), so rotate hat -90° around X
                // to map hat's local +Y (up) onto bone's local -Z (which = world +Y)
                this._hatCorrectionQuat = new THREE.Quaternion().setFromAxisAngle(
                    new THREE.Vector3(1, 0, 0), -Math.PI / 2
                );

                // Weather system
                this._weather = 'sunny'; // 'sunny' | 'rain' | 'transitioning'
                this._weatherT = 0; // 0 = sunny, 1 = rain (lerp factor)
                this._weatherTarget = 0;
                this._weatherSpeed = 0.3; // transition speed (units/sec)
                this._rainParticles = null;
                this._rainAudio = null;

                // Market cap / standing system
                this._marketCap = null;
                this._capyStanding = false;
                this._mcapBubble = null;
                this._mcapBubbleMat = null;
                this._mcapBubbleCanvas = null;
                this._standingCapybara = null;
                this._standingHeadBone = null;
                this._standingHeadBaseRotY = 0;
                this._standingHeadBaseRotZ = 0;
                this._standingHeadBaseRotX = 0;
                // Stand FX
                this._standFXt = 0;
                this._standFXTarget = 0;
                this._standFXSpeed = 0.5;
                this._standMixer = null;
                this._standUpAction = null;
                this._standIdleAction = null;
                this._standHaloLight = null;
                this._thunderAudio = null;
                this._standRevealTimer = null;
                this._lightningFlash = 0; // 0–1, decays per frame for sky flicker
                // Reusable vecs for bubble positioning (avoid per-frame allocation)
                this._bubbleCamRight = new THREE.Vector3();
                this._bubbleCamFwd = new THREE.Vector3();
                this._bubbleHeadPos = new THREE.Vector3();

                this.setupLighting();
                this.loadModels().then(() => this.buildScene());
                this.animate();

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupLighting() {
                this._hemi = new THREE.HemisphereLight(0xd4e8f0, 0x3a5f2a, 0.8);
                this.scene.add(this._hemi);

                this._sun = new THREE.DirectionalLight(0xfff4d6, 1.2);
                this._sun.position.set(10, 20, 5);
                this._sun.castShadow = true;
                this._sun.shadow.mapSize.set(this._isMobile ? 512 : 1024, this._isMobile ? 512 : 1024);
                this._sun.shadow.camera.left = -20;
                this._sun.shadow.camera.right = 20;
                this._sun.shadow.camera.top = 20;
                this._sun.shadow.camera.bottom = -20;
                this._sun.shadow.camera.near = 0.5;
                this._sun.shadow.camera.far = 60;
                this._sun.shadow.bias = -0.001;
                this.scene.add(this._sun);

                this._ambient = new THREE.AmbientLight(0x607060, 0.4);
                this.scene.add(this._ambient);
            }

            async loadModels() {
                const loader = new GLTFLoader();
                const bar = document.getElementById('loadBar');
                const text = document.getElementById('loadText');

                const modelFiles = {
                    'palm-trees': 'models/palm-trees.glb',
                    'tree1': 'models/tree1.glb',
                    'tree2': 'models/tree2.glb',
                    'trees': 'models/trees.glb',
                    'grass-turf': 'models/grass-turf.glb',
                    'flower': 'models/flower.glb',
                    'rocks': 'models/rocks.glb',
                    'rock2': 'models/rock2.glb',
                    'capybara': 'models/capybara-rigged.glb',
                };

                // ── ADD NEW HATS HERE ──────────────────────────────────────────
                const hatFiles = [
                    'models/hats/baseball.glb',
                    'models/hats/graduation.glb',
                    'models/hats/hardhat.glb',
                    'models/hats/pirate.glb',
                    'models/hats/tophat.glb',
                    'models/hats/wizard.glb',
                ];
                // ──────────────────────────────────────────────────────────────

                // Auto-compute total so loading bar stays accurate when hats are added
                this.totalModels = Object.keys(modelFiles).length + hatFiles.length;

                for (const [name, path] of Object.entries(modelFiles)) {
                    try {
                        text.textContent = `loading ${name}...`;
                        const gltf = await new Promise((resolve, reject) => {
                            loader.load(path, resolve, undefined, reject);
                        });
                        this.models[name] = gltf.scene;
                        // Store animations for capybara
                        if (name === 'capybara' && gltf.animations.length > 0) {
                            this.capyAnimations = gltf.animations;
                            console.log('Capybara animations:', gltf.animations.map(a => a.name));
                        }
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    } catch (e) {
                        console.warn(`Failed to load ${name}:`, e);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    }
                }

                // Load hats
                for (const hatPath of hatFiles) {
                    try {
                        const hatName = hatPath.split('/').pop().replace('.glb', '');
                        text.textContent = `loading ${hatName}...`;
                        const gltf = await new Promise((resolve, reject) => {
                            loader.load(hatPath, resolve, undefined, reject);
                        });
                        const normalized = this.normalizeHatModel(gltf.scene);
                        this.hatModels.push(normalized);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    } catch (e) {
                        console.warn(`Failed to load hat ${hatPath}:`, e);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    }
                }

                // Load standing capybara (optional - dormant until model file is provided)
                await this._loadStandingCapybara(loader);
            }

            placeModel(name, x, y, z, scale = 1, rotY = 0) {
                const src = this.models[name];
                if (!src) return null;
                const clone = src.clone();
                clone.position.set(x, y, z);
                clone.scale.set(scale, scale, scale);
                clone.rotation.y = rotY;
                clone.traverse(c => {
                    if (c.isMesh) {
                        c.castShadow = true;
                        c.receiveShadow = true;
                    }
                });
                this.scene.add(clone);
                return clone;
            }

            // Normalize a hat GLB to a consistent brim width and zero-based pivot.
            // Scales the model so its widest horizontal dimension = targetWidth (world meters),
            // centers it on XZ, and shifts it so its bottom sits at local y=0.
            // Wraps in a Group so the attachment point is always hat-bottom-center.
            // Drop any new hat GLB in models/hats/ and it will auto-fit.
            normalizeHatModel(hatScene, targetWidth = 0.6) {
                const box = new THREE.Box3().setFromObject(hatScene);
                const size = box.getSize(new THREE.Vector3());

                // Scale by max horizontal span (X or Z) — preserves hat proportions
                const maxHoriz = Math.max(size.x, size.z);
                if (maxHoriz > 0) hatScene.scale.setScalar(targetWidth / maxHoriz);

                // Recompute after scale: center XZ, push bottom to y = 0
                const box2 = new THREE.Box3().setFromObject(hatScene);
                const center2 = box2.getCenter(new THREE.Vector3());
                hatScene.position.x -= center2.x;
                hatScene.position.z -= center2.z;
                hatScene.position.y -= box2.min.y;

                // Wrap so external position/rotation acts on bottom-center of hat
                const wrapper = new THREE.Group();
                wrapper.add(hatScene);
                return wrapper;
            }

            // 500 individual clones → 1 InstancedMesh draw call, wind lives in vertex shader
            _buildFlowerInstances() {
                let srcMesh = null;
                this.models['flower'].traverse(c => {
                    if (c.isMesh && c.material && c.material.name === 'Flowers' && !srcMesh) srcMesh = c;
                });
                if (!srcMesh) return;

                const geo = srcMesh.geometry.clone();
                const localMat = new THREE.Matrix4().compose(srcMesh.position, srcMesh.quaternion, srcMesh.scale);
                geo.applyMatrix4(localMat);

                const mat = srcMesh.material.clone();
                mat.map = null;
                mat.color.set(0xc4a0e0);
                mat.userData.uniforms = { windTime: { value: 0 } };
                mat.onBeforeCompile = (shader) => {
                    shader.uniforms.windTime = mat.userData.uniforms.windTime;
                    shader.vertexShader = `
                        attribute float aWindPhase;
                        attribute float aWindStrength;
                        uniform float windTime;
                    ` + shader.vertexShader.replace(
                        '#include <begin_vertex>',
                        `#include <begin_vertex>
                        float wX = sin(windTime * 1.5 + aWindPhase) * aWindStrength;
                        float wZ = sin(windTime * 1.2 + aWindPhase * 0.7) * aWindStrength * 0.6;
                        transformed.x += transformed.y * wX;
                        transformed.z += transformed.y * wZ;`
                    );
                };

                const COUNT = 400;
                const mesh = new THREE.InstancedMesh(geo, mat, COUNT);
                mesh.castShadow = false;
                mesh.receiveShadow = false;
                mesh.frustumCulled = false;

                const windPhases    = new Float32Array(COUNT);
                const windStrengths = new Float32Array(COUNT);
                const dummy = new THREE.Object3D();
                let idx = 0;
                const clusters = [[0,0],[-4,2],[5,-1],[-2,-3],[3,4],[-6,-2],[7,2],[-3,5],[1,-5],[6,-4]];

                for (let attempt = 0; attempt < 1500 && idx < COUNT; attempt++) {
                    const c = clusters[Math.floor(Math.random() * clusters.length)];
                    const x = c[0] + (Math.random() - 0.5) * 8;
                    const z = c[1] + (Math.random() - 0.5) * 5;
                    if (z < -7 || z > 8) continue;
                    if (Math.sqrt(x * x + z * z) < 1.2) continue;
                    const scale = 0.30 + Math.random() * 0.2;
                    dummy.position.set(x, 0, z);
                    dummy.rotation.set(0, Math.random() * Math.PI * 2, 0);
                    dummy.scale.setScalar(scale);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(idx, dummy.matrix);
                    windPhases[idx]    = Math.random() * Math.PI * 2;
                    windStrengths[idx] = 0.06 + Math.random() * 0.05;
                    idx++;
                }
                mesh.count = idx;
                mesh.instanceMatrix.needsUpdate = true;
                geo.setAttribute('aWindPhase',    new THREE.InstancedBufferAttribute(windPhases.slice(0, idx), 1));
                geo.setAttribute('aWindStrength', new THREE.InstancedBufferAttribute(windStrengths.slice(0, idx), 1));
                this.scene.add(mesh);
                this._instancedFlowers = mesh;
            }

            // Terrain: foreground SAME LEVEL as pond, small bump behind
            getTerrainY(x, z) {
                if (z > -10) return 0; // flat foreground + pond area at same level
                if (z > -16) return 0; // pond zone, flat
                // Behind pond: gentle bump/hill, NOT a mountain
                if (z > -30) {
                    const t = (z + 16) / (-14);
                    return t * t * 3.0; // small rise, max ~3m
                }
                return 3.0;
            }

            buildScene() {
                // === TERRAIN ===
                const groundGeo = new THREE.PlaneGeometry(140, 120, 50, 40);
                groundGeo.rotateX(-Math.PI / 2);
                const pos = groundGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    let y = this.getTerrainY(x, z);
                    const edgeDist = Math.abs(x) - 25;
                    if (edgeDist > 0) y += edgeDist * 0.2;
                    pos.setY(i, y);
                }
                groundGeo.computeVertexNormals();

                const colors = new Float32Array(pos.count * 3);
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    const distToPond = Math.sqrt(x * x + (z + 13) * (z + 13));
                    let r, g, b;
                    if (distToPond < 7) {
                        const t = Math.max(0, 1 - distToPond / 7);
                        r = 0.22 + t * 0.55;
                        g = 0.42 + t * 0.12;
                        b = 0.16 + t * 0.20;
                    } else {
                        r = 0.20 + Math.random() * 0.02;
                        g = 0.42 + Math.random() * 0.03;
                        b = 0.15;
                    }
                    colors[i * 3] = r;
                    colors[i * 3 + 1] = g;
                    colors[i * 3 + 2] = b;
                }
                groundGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ vertexColors: true }));
                ground.receiveShadow = true;
                this.scene.add(ground);

                // === SKY DOME ===
                const skyGeo = new THREE.SphereGeometry(200, 32, 16);
                const skyMat = new THREE.ShaderMaterial({
                    side: THREE.BackSide,
                    uniforms: {
                        topColor: { value: new THREE.Color(0x87CEEB) },
                        bottomColor: { value: new THREE.Color(0xd0ddd0) },
                        offset: { value: 10 },
                        exponent: { value: 0.4 },
                    },
                    vertexShader: `
                        varying vec3 vWorldPos;
                        void main() {
                            vec4 wp = modelMatrix * vec4(position, 1.0);
                            vWorldPos = wp.xyz;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 topColor;
                        uniform vec3 bottomColor;
                        uniform float offset;
                        uniform float exponent;
                        varying vec3 vWorldPos;
                        void main() {
                            float h = normalize(vWorldPos + offset).y;
                            gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                        }
                    `,
                });
                this._skyMat = skyMat;
                this.scene.add(new THREE.Mesh(skyGeo, skyMat));

                // === POND ===
                const waterGeo = new THREE.CircleGeometry(8, 32);
                waterGeo.rotateX(-Math.PI / 2);
                const water = new THREE.Mesh(waterGeo, new THREE.MeshLambertMaterial({
                    color: 0x6aaebb, transparent: true, opacity: 0.6,
                }));
                // Sandy bank around pond
                const sandGeo = new THREE.CircleGeometry(10, 32);
                sandGeo.rotateX(-Math.PI / 2);
                const sand = new THREE.Mesh(sandGeo, new THREE.MeshLambertMaterial({ color: 0xc4a86a }));
                sand.position.set(0, 0.005, -13);
                sand.receiveShadow = true;
                this.scene.add(sand);

                // Water
                water.position.set(0, 0.01, -13);
                this.scene.add(water);

                // === FLOWERS (flower.glb, instanced lavender, GPU wind) ===
                if (this.models['flower']) {
                    this._buildFlowerInstances();
                }

                // === GRASS TUFTS - sparse ===
                if (this.models['grass-turf']) {
                    const spots = [
                        [-4, 2], [6, 0], [-8, -3], [10, 4], [-2, -6],
                        [5, -5], [-7, 6], [3, -8], [12, -2], [-11, 0],
                    ];
                    for (const [x, z] of spots) {
                        this.placeModel('grass-turf', x, 0.05, z, 0.5 + Math.random() * 0.3, Math.random() * Math.PI * 2);
                    }
                }

                // === PALM TREES ===
                // palm-trees.glb is 25x5x5 (a cluster). Scale ~0.4 = ~10m wide cluster, ~2m tall
                // Need them visible. Place in mid-ground around pond, scale so they're prominent
                // Extract individual palm trees from the cluster model
                // The GLB has PalmTree_1 through PalmTree_5 as groups
                if (this.models['palm-trees']) {
                    const palmGroups = [];
                    this.models['palm-trees'].traverse(c => {

            setupHatCycling() {
                // Per-hat placement offsets (world units). normalizeHatModel()
                // already set brim to 0.55m, so just tune up/fwd here.
                // up  = meters above bone pivot (world +Y)
                // fwd = meters forward (world +Z, capybara faces +Z)
                // Order must match hatFiles in loadModels()
                const hatConfigs = [
                    { up: 0.50, fwd: 0.0 },  // baseball
                    { up: 0.32, fwd: -0.06 },  // graduation
                    { up: 0.57, fwd: 0.0 },  // hardhat
                    { up: 0.28, fwd: 0.06 },  // pirate
                    { up: 0.54, fwd: -0.08 },  // tophat
                    { up: 0.58, fwd: -0.04 },  // wizard
                ];

                const onTap = () => {
                    // Cycle: -1 (none) -> 0 -> 1 -> ... -> N-1 -> -1 ...
                    this.currentHatIndex++;
                    if (this.currentHatIndex >= this.hatModels.length) {
                        this.currentHatIndex = -1;
                    }

                    // Remove current hat
                    if (this.currentHatMesh && this.currentHatMesh.parent) {
                        this.currentHatMesh.parent.remove(this.currentHatMesh);
                        this.currentHatMesh = null;
                        this._currentHatCfg = null;
                    }

                    // Add new hat
                    if (this.currentHatIndex >= 0 && this._capyHeadBone) {
                        const hat = this.hatModels[this.currentHatIndex].clone();

                        // Fix Poly Pizza materials (move emissive to diffuse like capybara)
                        hat.traverse(c => {
                            if (c.isMesh && c.material) {
                                if (c.material.emissiveMap && !c.material.map) {
                                    c.material.map = c.material.emissiveMap;
                                    c.material.emissive.setScalar(0);
                                    c.material.emissiveMap = null;
                                    c.material.needsUpdate = true;
                                }
                            }
                        });

                        // Per-hat tweaks
                        const cfg = hatConfigs[this.currentHatIndex] || { up: 0.50, fwd: 0.14 };

                        // Hat lives in scene root (scale=1, position/rotation set per-frame in animate).
                        hat.scale.set(1, 1, 1);

                        // Per-hat tweaks (after scale reset)
                        if (this.currentHatIndex === 0) { // baseball cap -> blue
                            hat.traverse(c => {
                                if (c.isMesh) {
                                    c.material = c.material.clone();
                                    c.material.color.setHex(0x1a3a8a);
                                    c.material.needsUpdate = true;
                                }
                            });
                        }
                        if (this.currentHatIndex === 1) { // graduation -> rotate so tassel hangs to side
                            hat.children[0].rotation.y = Math.PI / 2;
                            hat.children[0].rotation.z = -Math.PI / 12; // -15° tilt
                        }
                        if (this.currentHatIndex === 2) { // hardhat -> rotate -90° to face forward
                            hat.children[0].rotation.y = -Math.PI / 2;
                            hat.children[0].position.x += 0.04;
                        }
                        if (this.currentHatIndex === 4) { // tophat -> 25% bigger
                            hat.scale.set(1.25, 1.25, 1.25);
                            hat.children[0].rotation.x = -Math.PI / 18; // -10° X rotation
                        }
                        if (this.currentHatIndex === 5) { // wizard -> 25% bigger
                            hat.scale.set(1.25, 1.25, 1.25);
                            hat.children[0].rotation.x = -7 * Math.PI / 180; // -7° X
                        }
                        if (this.currentHatIndex === 3) { // pirate -> 40% bigger, nudge sideways
                            hat.scale.set(1.40, 1.40, 1.40);
                            hat.children[0].position.x += 0.04;
                        }

                        this._currentHatCfg = cfg;
                        this.scene.add(hat);
                        this.currentHatMesh = hat;
                    }
                };

                // Tap anywhere on canvas to cycle hats.
                // Use pointer events with drag detection to avoid OrbitControls
                // drag gestures being mistaken for taps.
                let _ptrDown = new THREE.Vector2();
                let _ptrMoved = false;
                this.renderer.domElement.addEventListener('pointerdown', e => {
                    _ptrDown.set(e.clientX, e.clientY);
                    _ptrMoved = false;
                });
                this.renderer.domElement.addEventListener('pointermove', e => {
                    if (Math.hypot(e.clientX - _ptrDown.x, e.clientY - _ptrDown.y) > 6) _ptrMoved = true;
                });
                this.renderer.domElement.addEventListener('pointerup', e => {
                    if (!_ptrMoved && this._hatsEnabled) onTap();
                });
            }

            setupMusic() {
                this.tracks = [
                    'audio/lofi_loop_01.mp3', 'audio/lofi_loop_02.mp3', 'audio/lofi_loop_03.mp3',
                    'audio/lofi_loop_04.mp3', 'audio/lofi_loop_05.mp3', 'audio/lofi_loop_06.mp3',
                    'audio/lofi_loop_07.mp3', 'audio/lofi_loop_08.mp3', 'audio/lofi_loop_09.mp3',
                ];
                this.currentTrack = Math.floor(Math.random() * this.tracks.length);
                this.audio = new Audio(this.tracks[this.currentTrack]);
                this.audio.volume = 0.3;

                // When track ends, play next in loop
                this._onTrackEnd = () => {
                    this.currentTrack = (this.currentTrack + 1) % this.tracks.length;
                    const vol = this.audio.volume;
                    this.audio = new Audio(this.tracks[this.currentTrack]);
                    this.audio.volume = vol;
                    this.audio.addEventListener('ended', this._onTrackEnd);
                    this.audio.play().catch(() => {});
                };
                this.audio.addEventListener('ended', this._onTrackEnd);

                const startMusic = () => {
                    this.audio.play().catch(() => {});
                    document.removeEventListener('click', startMusic);
                    document.removeEventListener('touchstart', startMusic);
                };
                document.addEventListener('click', startMusic);
                document.addEventListener('touchstart', startMusic);
                this.audio.play().catch(() => {});

                // Skip button
                document.getElementById('btn-skip').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.currentTrack = (this.currentTrack + 1) % this.tracks.length;
                    const wasPlaying = !this.audio.paused;
                    const vol = this.audio.volume;
                    this.audio.pause();
                    this.audio = new Audio(this.tracks[this.currentTrack]);
                    this.audio.volume = vol;
                    this.audio.addEventListener('ended', this._onTrackEnd);
                    if (wasPlaying) this.audio.play().catch(() => {});
                });

                // Mute toggle
                this._muted = false;
                this._savedVolume = this.audio.volume;
                document.getElementById('btn-mute').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._muted = !this._muted;
                    if (this._muted) {
                        this._savedVolume = this.audio.volume;
                        this.audio.volume = 0;
                        if (this._rainAudio) this._rainAudio.volume = 0;
                        if (this._thunderAudio) this._thunderAudio.volume = 0;
                    } else {
                        this.audio.volume = this._savedVolume;
                    }
                    document.getElementById('btn-mute').innerHTML = this._muted
                        ? '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
                        : '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>';
                });
            }

            setupWeather() {
                // Rain particle system: GPU-driven, zero CPU per frame
                const count = this._isMobile ? 1500 : 3000;
                const speeds    = new Float32Array(count);
                const seedsY    = new Float32Array(count);
                const xzOffsets = new Float32Array(count * 2);
                for (let i = 0; i < count; i++) {
                    speeds[i]          = 8 + Math.random() * 6;
                    seedsY[i]          = Math.random();
                    xzOffsets[i * 2]   = (Math.random() - 0.5) * 50;
                    xzOffsets[i * 2+1] = (Math.random() - 0.5) * 50;
                }
                const geo = new THREE.BufferGeometry();
                const dummyPos = new Float32Array(count * 3); // GPU overrides gl_Position
                geo.setAttribute('position',  new THREE.BufferAttribute(dummyPos, 3));
                geo.setAttribute('aSpeed',    new THREE.BufferAttribute(speeds, 1));
                geo.setAttribute('aSeedY',    new THREE.BufferAttribute(seedsY, 1));
                geo.setAttribute('aXZOffset', new THREE.BufferAttribute(xzOffsets, 2));

                // Raindrop sprite texture (same visual as before)
                const canvas = document.createElement('canvas');
                canvas.width = 8; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 8, 128);
                const grad = ctx.createLinearGradient(0, 0, 0, 128);
                grad.addColorStop(0,   'rgba(200,215,230,0)');
                grad.addColorStop(0.1, 'rgba(220,235,250,0.4)');
                grad.addColorStop(0.4, 'rgba(255,255,255,0.9)');
                grad.addColorStop(0.9, 'rgba(200,215,230,0.3)');
                grad.addColorStop(1,   'rgba(200,215,230,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(3, 0, 2, 128);
                const tex = new THREE.CanvasTexture(canvas);

                this._rainUniforms = {
                    time:    { value: 0 },
                    camPos:  { value: new THREE.Vector3() },
                    opacity: { value: 0 },
                    map:     { value: tex },
                };
                const mat = new THREE.ShaderMaterial({
                    uniforms: this._rainUniforms,
                    vertexShader: `
                        attribute float aSpeed;
                        attribute float aSeedY;
                        attribute vec2  aXZOffset;
                        uniform float time;
                        uniform vec3  camPos;
                        uniform float opacity;
                        varying float vAlpha;
                        void main() {
                            float y = mod(aSeedY * 26.0 - time * aSpeed, 27.0) - 2.0;
                            vec3 wp = vec3(camPos.x + aXZOffset.x, y, camPos.z + aXZOffset.y);
                            gl_Position  = projectionMatrix * viewMatrix * vec4(wp, 1.0);
                            gl_PointSize = 3.0;
                            vAlpha = opacity;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D map;
                        varying float vAlpha;
                        void main() {
                            vec4 t = texture2D(map, gl_PointCoord);
                            if (t.a < 0.01) discard;
                            gl_FragColor = vec4(t.rgb, t.a * vAlpha);
                        }
                    `,
                    transparent: true,
                    depthWrite:  false,
                    blending:    THREE.AdditiveBlending,
                });
                this._rainParticles = new THREE.Points(geo, mat);
                this._rainParticles.frustumCulled = false;
                this.scene.add(this._rainParticles);

                // Rain ambient audio
                this._rainAudio = new Audio('audio/rain_01.mp3');
                this._rainAudio.loop = true;
                this._rainAudio.volume = 0;

                // Thunder audio (plays during $1M standing FX)
                this._thunderAudio = new Audio('audio/thunder_01.mp3');
                this._thunderAudio.loop = true;
                this._thunderAudio.volume = 0;

                // Store sunny baseline colors for lerping
                this._sunnyBg = new THREE.Color(0xc8dce8);
                this._rainyBg = new THREE.Color(0x5a6268);
                this._sunnyFog = new THREE.Color(0xc5d8c5);
                this._rainyFog = new THREE.Color(0x6a7570);
                this._sunnySkyTop = new THREE.Color(0x87CEEB);
                this._rainySkyTop = new THREE.Color(0x505860);
                this._sunnySkyBot = new THREE.Color(0xd0ddd0);
                this._rainySkyBot = new THREE.Color(0x788080);
                this._sunnyHemiSky = new THREE.Color(0xd4e8f0);
                this._rainyHemiSky = new THREE.Color(0x707878);

                // Rain toggle button
                this._rainUserVol = 0.4; // user's preferred rain volume
                document.getElementById('btn-rain').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleRain();
                });

            }

            toggleRain() {
                const goingRainy = this._weatherTarget === 0;
                this._weatherTarget = goingRainy ? 1 : 0;
                if (goingRainy) {
                    this._rainAudio.play().catch(() => {});
                }
                document.getElementById('btn-rain').classList.toggle('active', goingRainy);
            }

            _updateWeather(delta, time) {
                // Lerp toward target
                if (this._weatherT < this._weatherTarget) {
                    this._weatherT = Math.min(this._weatherT + this._weatherSpeed * delta, 1);
                } else if (this._weatherT > this._weatherTarget) {
                    this._weatherT = Math.max(this._weatherT - this._weatherSpeed * delta, 0);
                }
                const t = this._weatherT;

                // Rain: GPU shader — just update uniforms, zero CPU particle work
                if (this._rainUniforms) {
                    this._rainUniforms.time.value    = time;
                    this._rainUniforms.camPos.value.copy(this.camera.position);
                    this._rainUniforms.opacity.value = t * 0.8;
                }

                // Atmosphere lerps
                this.scene.background.lerpColors(this._sunnyBg, this._rainyBg, t);
                this.scene.fog.color.lerpColors(this._sunnyFog, this._rainyFog, t);
                this.scene.fog.density = 0.014 + t * 0.011;

                // Sky dome
                if (this._skyMat) {
                    this._skyMat.uniforms.topColor.value.lerpColors(this._sunnySkyTop, this._rainySkyTop, t);
                    this._skyMat.uniforms.bottomColor.value.lerpColors(this._sunnySkyBot, this._rainySkyBot, t);
                }

                // Lighting
                this._sun.intensity = 1.2 - t * 0.9;
                this._hemi.color.lerpColors(this._sunnyHemiSky, this._rainyHemiSky, t);
                this._ambient.intensity = 0.4 + t * 0.15;

                // Rain audio volume (user-controlled max, fades with weather)
                if (this._rainAudio) {
                    this._rainAudio.volume = this._muted ? 0 : t * (this._rainUserVol || 0.4);
                    if (t === 0 && !this._rainAudio.paused) this._rainAudio.pause();
                }
            }

            testStand() {
                this._testLock = true; // freeze WS updates during test
                this._marketCap = 900_000;
                this._updateMarketCapBubble();
                const step = 10_000;
                console.log('[testStand] ramping $900K → $1M (WS paused)...');
                const timer = setInterval(() => {
                    this._marketCap += step;
                    this._updateMarketCapBubble();
                    this._updateCapyStanding();
                    console.log('[testStand]', this.formatMcap(this._marketCap));
                    if (this._marketCap >= 1_000_000) {
                        clearInterval(timer);
                        this._testLock = false; // resume WS
                        console.log('[testStand] done — WS resumed');
                    }
                }, 1000);
            }

            formatMcap(v) {
                if (v == null) return '...';
                if (v >= 1_000_000_000) return `$${(v / 1_000_000_000).toFixed(2)}B`;
                if (v >= 1_000_000)     return `$${(v / 1_000_000).toFixed(2)}M`;
                if (v >= 1_000)         return `$${(v / 1_000).toFixed(1)}K`;
                return `$${Math.round(v)}`;
            }

            setupMarketCap() {
                const MINT = 'LWPihkg8SWDiAzG5TXAsgQuJeSZ3cXem1VStNX8PLAY';
                const THROTTLE_MS = 5 * 60 * 1000; // 5 minutes
                let lastUpdate = 0;

                const socket = io('wss://ws.play.fun/realtime', {
                    transports: ['websocket'],
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionDelayMax: 5000,
                    reconnectionAttempts: Infinity,
                });
                socket.on('connect', () => {
                    console.log('[mcap] connected:', socket.id);
                    socket.emit('join-mint', MINT);
                });
                socket.on('disconnect', (reason) => {
                    console.warn('[mcap] disconnected:', reason);
                });
                socket.on('connect_error', (err) => {
                    console.warn('[mcap] connection error:', err.message);
                });
                socket.on('token-updates', (batch) => {
                    if (this._testLock) return;
                    const now = Date.now();
                    const doVisualUpdate = lastUpdate === 0 || now - lastUpdate >= THROTTLE_MS;
                    for (const u of batch.updates) {
                        if (u.mint !== MINT) continue;
                        this._marketCap = u.marketCap;
                        // Always check standing so animation never misses a $1M cross
                        const prevStanding = this._capyStanding;
                        this._updateCapyStanding();
                        // Redraw bubble on first update, every 5 min, or if standing changed
                        if (doVisualUpdate || this._capyStanding !== prevStanding) {
                            if (doVisualUpdate) lastUpdate = now;
                            this._updateMarketCapBubble();
                        }
                    }
                });
                window.addEventListener('beforeunload', () => {
                    socket.emit('leave-mint', MINT);
                    socket.disconnect();
                });
            }

            _createMarketCapBubble() {
                const W = 256, H = 140;
                const canvas = document.createElement('canvas');
                canvas.width = W; canvas.height = H;
                this._mcapBubbleCanvas = canvas;

                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 0.71), mat);
                mesh.position.set(0, 1.5, 0); // updated every frame in animate()
                mesh.visible = false; // hidden — standing trigger still active
                this.scene.add(mesh);
                this._mcapBubble = mesh;
                this._mcapBubbleMat = mat;

                this._drawBubble('...');
            }

            _drawBubble(text) {
                const canvas = this._mcapBubbleCanvas;
                if (!canvas) return;
                const W = canvas.width, H = canvas.height;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, W, H);

                // Bubble body (rounded rect)
                const bH = H * 0.72, bW = W * 0.88, bX = (W - bW) / 2, bY = 4;
                const r = 18;
                ctx.beginPath();
                ctx.moveTo(bX + r, bY);
                ctx.lineTo(bX + bW - r, bY);
                ctx.quadraticCurveTo(bX + bW, bY, bX + bW, bY + r);
                ctx.lineTo(bX + bW, bY + bH - r);
                ctx.quadraticCurveTo(bX + bW, bY + bH, bX + bW - r, bY + bH);
                // Tail: angled from bottom-right toward capybara head (lower-right)
                ctx.lineTo(bX + bW * 0.86, bY + bH);
                ctx.lineTo(W - 14, H - 2);   // tip — bottom-right corner
                ctx.lineTo(bX + bW * 0.68, bY + bH);
                ctx.lineTo(bX + r, bY + bH);
                ctx.quadraticCurveTo(bX, bY + bH, bX, bY + bH - r);
                ctx.lineTo(bX, bY + r);
                ctx.quadraticCurveTo(bX, bY, bX + r, bY);
                ctx.closePath();

                const gold = this._marketCap != null && this._marketCap >= 1_000_000;

                // Fill
                ctx.fillStyle = gold ? 'rgba(40, 28, 5, 0.88)' : 'rgba(15, 20, 30, 0.82)';
                ctx.fill();
                // Border
                ctx.strokeStyle = gold ? 'rgba(255, 200, 60, 0.8)' : 'rgba(255, 255, 255, 0.35)';
                ctx.lineWidth = gold ? 2.5 : 2;
                ctx.stroke();

                // Label
                ctx.fillStyle = gold ? 'rgba(255, 200, 80, 0.85)' : 'rgba(180, 200, 220, 0.7)';
                ctx.font = '500 17px Quicksand, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$CAPYSIM', W / 2, bY + bH * 0.25);

                // Value
                ctx.fillStyle = gold ? '#ffd84d' : '#ffffff';
                ctx.font = '500 28px Quicksand, sans-serif';
                ctx.fillText(text, W / 2, bY + bH * 0.55);

                // mcap sub-label
                ctx.fillStyle = gold ? 'rgba(255, 190, 60, 0.55)' : 'rgba(180, 200, 220, 0.5)';
                ctx.font = '500 13px Quicksand, sans-serif';
                ctx.fillText('mcap', W / 2, bY + bH * 0.82);

                if (this._mcapBubbleMat) this._mcapBubbleMat.map.needsUpdate = true;
            }

            _updateMarketCapBubble() {
                this._drawBubble(this.formatMcap(this._marketCap));
            }

            async _loadStandingCapybara(loader) {
                try {
                    const gltf = await new Promise((resolve, reject) => {
                        loader.load('models/capybara-standing.glb', resolve, undefined, reject);
                    });
                    const capy = gltf.scene;
                    const box = new THREE.Box3().setFromObject(capy);
                    const size = box.getSize(new THREE.Vector3());
                    console.log('[capybara-stands] standing model size:', size.x.toFixed(2), size.y.toFixed(2), size.z.toFixed(2));
                    const scaleFactor = 1.0 / (size.y || 0.001);
                    const standGroup = new THREE.Group();
                    standGroup.add(capy);
                    capy.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    standGroup.position.y = -0.05;
                    standGroup.visible = false; // hidden until $1M threshold

                    capy.traverse(c => {
                        if (c.isMesh) {
                            c.castShadow = true;
                            c.receiveShadow = true;
                            if (c.material) {
                                c.material = c.material.clone();
                                if (c.material.emissiveMap && !c.material.map) {
                                    c.material.map = c.material.emissiveMap;
                                }
                                c.material.emissive.set(0, 0, 0);
                                c.material.emissiveIntensity = 0;
                                c.material.emissiveMap = null;
                                c.material.metalness = 0;
                                c.material.roughness = 0.8;
                                c.material.needsUpdate = true;
                            }
                        }
                        // Head bone — biped model uses capital 'Head'
                        if ((c.name === 'Head' || c.name === 'head') && c.isBone) {
                            this._standingHeadBone = c;
                            this._standingHeadBaseRotY = c.rotation.y;
                            this._standingHeadBaseRotZ = c.rotation.z;
                            this._standingHeadBaseRotX = c.rotation.x;
                        }
                    });

                    this.scene.add(standGroup);
                    this._standingCapybara = standGroup;

                    // AnimationMixer for stand-up + idle clips
                    this._standMixer = new THREE.AnimationMixer(standGroup);
                    const upClip = gltf.animations.find(a => a.name.toLowerCase().includes('stand'));
                    const idleClip = gltf.animations.find(a => a.name.toLowerCase().includes('idle'));
                    console.log('[capybara-stands] animations found:', gltf.animations.map(a => a.name));
                    if (upClip) {
                        this._standUpAction = this._standMixer.clipAction(upClip);
                        this._standUpAction.loop = THREE.LoopOnce;
                        this._standUpAction.clampWhenFinished = true;
                    }
                    if (idleClip) {
                        this._standIdleAction = this._standMixer.clipAction(idleClip);
                        this._standIdleAction.loop = THREE.LoopRepeat;
                    }
                    // When stand-up finishes → transition to idle
                    this._standMixer.addEventListener('finished', (e) => {
                        if (e.action === this._standUpAction && this._capyStanding) {
                            this._standIdleAction.reset().play();
                        }
                    });

                    // Create halo effect
                    this._createStandHalo();
                    console.log('[capybara-stands] standing model loaded ✓');
                } catch (e) {
                    console.log('[capybara-stands] standing model not yet available — feature dormant');
                    this._standingCapybara = null;
                }
            }

            _createStandHalo() {
                // SpotLight above, pointing straight down to illuminate her body
                this._standHaloLight = new THREE.SpotLight(0xfff0cc, 0, 8, Math.PI / 5, 0.35);
                this._standHaloLight.position.set(0, 3.5, 0);
                this._standHaloLight.target.position.set(0, 0, 0);
                this.scene.add(this._standHaloLight);
                this.scene.add(this._standHaloLight.target);

                // Rim light from behind — golden silhouette glow around her body
                this._standRimLight = new THREE.PointLight(0xffd060, 0, 5);
                this._standRimLight.position.set(0, 0.9, -1.4); // behind her
                this.scene.add(this._standRimLight);

                // Soft fill light from the front — reveals her face during the darkness
                this._standFillLight = new THREE.PointLight(0xfff4e0, 0, 5);
                this._standFillLight.position.set(0, 0.8, 2.2); // in front, at body height
                this.scene.add(this._standFillLight);
            }

            _triggerStandFX() {
                if (!this._standingCapybara) return;
                // Hide hat and disable tap while standing
                this._hatsEnabled = false;
                if (this.currentHatMesh) this.currentHatMesh.visible = false;
                // Phase 1: start darkening immediately, capybara still sitting
                this._standFXTarget = 1;
                // Lightning flickers — 3 flashes timed roughly with thunder booms
                this._lightningFlash = 1.0;
                setTimeout(() => { this._lightningFlash = 1.0; }, 420);
                setTimeout(() => { this._lightningFlash = 0.85; }, 900);

                // Thunder: play exactly three times
                if (this._thunderAudio) {
                    this._thunderAudio.loop = false;
                    this._thunderPlayCount = 0;
                    this._thunderAudio.currentTime = 0;
                    this._thunderAudio.play().catch(() => {});
                    this._thunderAudio.onended = () => {
                        this._thunderPlayCount = (this._thunderPlayCount || 0) + 1;
                        if (this._thunderPlayCount < 3) {
                            this._thunderAudio.currentTime = 0;
                            this._thunderAudio.play().catch(() => {});
                        } else {
                            this._thunderAudio.onended = null;
                        }
                    };
                }
                // Phase 2: after 3s of darkness, swap model and play stand-up
                clearTimeout(this._standRevealTimer);
                this._standRevealTimer = setTimeout(() => {
                    if (!this._capyStanding) return; // mcap dropped before reveal
                    if (this.capybara) this.capybara.visible = false;
                    this._standingCapybara.visible = true;
                    if (this._standMixer) {
                        this._standMixer.stopAllAction();
                        if (this._standUpAction) this._standUpAction.reset().play();
                        else if (this._standIdleAction) this._standIdleAction.reset().play();
                    }
                    // Auto-revert FX after 15s more — capybara stays standing
                    this._standRevealTimer = setTimeout(() => {
                        this._standFXTarget = 0;
                    }, 15000);
                }, 3000);
            }

            _revertStandFX() {
                clearTimeout(this._standRevealTimer);
                this._standFXTarget = 0;
                this._lightningFlash = 0;
                // Restore hat
                this._hatsEnabled = true;
                if (this.currentHatMesh) this.currentHatMesh.visible = true;
                if (this.capybara) this.capybara.visible = true;
                if (this._standingCapybara) this._standingCapybara.visible = false;
                if (this._standMixer) this._standMixer.stopAllAction();
            }

            _updateStandFX(delta) {
                if (this._standFXt === this._standFXTarget && this._standFXt === 0) return;
                if (this._standFXt < this._standFXTarget)
                    this._standFXt = Math.min(this._standFXt + this._standFXSpeed * delta, 1);
                else
                    this._standFXt = Math.max(this._standFXt - this._standFXSpeed * delta, 0);
                const t = this._standFXt;

                // Override all lighting — runs after _updateWeather so these win
                this._sun.intensity = THREE.MathUtils.lerp(1.2, 0.0, t);
                this._hemi.intensity = THREE.MathUtils.lerp(1.0, 0.0, t);
                this._hemi.color.lerpColors(this._sunnyHemiSky, new THREE.Color(0x050510), t);
                this._ambient.intensity = THREE.MathUtils.lerp(0.4, 0.05, t);
                this.scene.background.lerpColors(this._sunnyBg, new THREE.Color(0x000005), t);
                // Sky dome shader uniforms
                if (this._skyMat) {
                    this._skyMat.uniforms.topColor.value.lerpColors(this._sunnySkyTop, new THREE.Color(0x000005), t);
                    this._skyMat.uniforms.bottomColor.value.lerpColors(this._sunnySkyBot, new THREE.Color(0x000005), t);
                }
                // Lightning flicker — brief blue-white spike on top of dark sky
                if (this._lightningFlash > 0) {
                    this._lightningFlash = Math.max(0, this._lightningFlash - delta * 7);
                    const _fc = new THREE.Color(0x99aaff);
                    const _fi = this._lightningFlash * 0.75;
                    this.scene.background.lerp(_fc, _fi);
                    if (this._skyMat) {
                        this._skyMat.uniforms.topColor.value.lerp(_fc, _fi);
                        this._skyMat.uniforms.bottomColor.value.lerp(_fc, _fi);
                    }
                    this._sun.intensity += this._lightningFlash * 3.0;
                    this._ambient.intensity += this._lightningFlash * 1.5;
                }
                this.scene.fog.color.lerpColors(this._sunnyFog, new THREE.Color(0x060612), t);
                this.scene.fog.density = THREE.MathUtils.lerp(0.014, 0.03, t);

                // Thunder audio
                if (this._thunderAudio) {
                    this._thunderAudio.volume = this._muted ? 0 : t * 0.75;
                    if (t === 0 && !this._thunderAudio.paused) this._thunderAudio.pause();
                }
                // Halo point light
                if (this._standHaloLight) this._standHaloLight.intensity = t * 5.0;
                if (this._standRimLight)  this._standRimLight.intensity  = t * 4.0;
                if (this._standFillLight) this._standFillLight.intensity = t * 1.8;
            }

            _updateCapyStanding() {
                const shouldStand = this._marketCap != null && this._marketCap >= 1_000_000;
                if (shouldStand === this._capyStanding) return;
                this._capyStanding = shouldStand;
                if (shouldStand) this._triggerStandFX();
                else this._revertStandFX();
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const delta = this.clock.getDelta();
                const time = this.clock.elapsedTime;

                // Advance standing model animations FIRST (head sway below will override mixer head)
                if (this._standMixer) this._standMixer.update(delta);

                // Head sway - slow, like she's vibing to the music (works on whichever model is active)
                const _activeHeadBone = this._capyStanding ? this._standingHeadBone : this._capyHeadBone;
                const _activeBaseRotY = this._capyStanding ? this._standingHeadBaseRotY : this._headBaseRotY;
                const _activeBaseRotZ = this._capyStanding ? this._standingHeadBaseRotZ : this._headBaseRotZ;
                const _activeBaseRotX = this._capyStanding ? this._standingHeadBaseRotX : this._headBaseRotX;
                if (_activeHeadBone) {
                    _activeHeadBone.rotation.y = _activeBaseRotY + Math.sin(time * 0.8) * 0.12;
                    _activeHeadBone.rotation.z = _activeBaseRotZ + Math.sin(time * 0.55 + 0.7) * 0.06;
                    _activeHeadBone.rotation.x = _activeBaseRotX + Math.sin(time * 0.5 + 1.2) * 0.04;
                }

                // Mcap bubble: follow head bone, offset screen-left, always face camera
                if (this._mcapBubble) {
                    // Use whichever head bone is currently active
                    const _bubbleBone = this._capyStanding ? this._standingHeadBone : this._capyHeadBone;
                    if (_bubbleBone) {
                        _bubbleBone.getWorldPosition(this._bubbleHeadPos);
                        this._bubbleCamRight.setFromMatrixColumn(this.camera.matrixWorld, 0);
                        this._bubbleCamFwd.setFromMatrixColumn(this.camera.matrixWorld, 2);
                        this._mcapBubble.position.copy(this._bubbleHeadPos)
                            .addScaledVector(this._bubbleCamRight, -1.1)
                            .addScaledVector(this._bubbleCamFwd, 0.7);
                        this._mcapBubble.position.y += 0.65;
                        this._mcapBubble.lookAt(this.camera.position);
                    }
                }

                // Hat follows head bone as a prop (offset rotates with bone)
                if (this.currentHatMesh && this._capyHeadBone && this._currentHatCfg) {
                    this._capyHeadBone.getWorldPosition(this._hatFollowPos);
                    this._capyHeadBone.getWorldQuaternion(this._hatFollowQuat);
                    const cfg = this._currentHatCfg;
                    // Offset in bone-local space: +Y = fwd, -Z = up
                    this._hatOffset.set(0, cfg.fwd, -cfg.up);
                    this._hatOffset.applyQuaternion(this._hatFollowQuat);
                    this.currentHatMesh.position.copy(this._hatFollowPos).add(this._hatOffset);
                    // Orientation: bone quat + correction (-90° X) so hat stays upright
                    this.currentHatMesh.quaternion.copy(this._hatFollowQuat)
                        .multiply(this._hatCorrectionQuat);
                }

                if (this._instancedFlowers) {
                    this._instancedFlowers.material.userData.uniforms.windTime.value = time;
                }

                // Weather transitions
                if (this._rainParticles) this._updateWeather(delta, time);

                // Standing FX (runs AFTER weather so lighting values override rain when active)
                if (this._standFXt > 0 || this._standFXTarget > 0) this._updateStandFX(delta);

                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.addEventListener('load', () => {
            window.game = new CapybaraSimulator();
        });
    </script>
</body>
</html>
