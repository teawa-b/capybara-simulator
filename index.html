                this._updateCapybara(delta, time);

                // Target ring gentle pulse
                if (this._targetRing) {
                    const pulse = 1 + Math.sin(time * 2.5) * 0.06;
                    this._targetRing.scale.set(pulse, 1, pulse);
                }

                // Game feel updates
                this._updateParticles(rawDelta);
                this._updateShake(rawDelta);

                // Animation mixer
                if (this._capyMixer) {
                    this._capyMixer.update(delta);
                }
            }

            /* ── Capybara movement ── */
            _updateCapybara(delta, time) {
                if (!this._capyGroup) return;

                if (this._state === 'fetching') {
                    // Run to stick
                    const dx = this._capyTargetPos.x - this._capyGroup.position.x;
                    const dz = this._capyTargetPos.z - this._capyGroup.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);

                    if (dist > 0.4) {
                        const speed = this._capySpeed * (this._sprinting ? this._sprintMultiplier : 1) * delta;
                        this._capyGroup.position.x += (dx / dist) * speed;
                        this._capyGroup.position.z += (dz / dist) * speed;
                        // Face movement direction
                        this._capyGroup.rotation.y = Math.atan2(dx, dz);
                        // Bob while running
                        this._capyGroup.position.y = Math.abs(Math.sin(time * 14)) * 0.04;
                        // Run animation speed
                        if (this._capyRunAction) this._capyRunAction.timeScale = this._sprinting ? 3.5 : 2.0;
                    } else {
                        // Reached the stick — pick it up
                        this._capyHasStick = true;
                        this._stick.visible = false;
                        this._state = 'returning';
                        this._capyTargetPos.copy(this._capyHomePos);
                    }
                } else if (this._state === 'returning') {
                    // Run back home
                    const dx = this._capyTargetPos.x - this._capyGroup.position.x;
                    const dz = this._capyTargetPos.z - this._capyGroup.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);

                    if (dist > 0.4) {
                        const speed = this._capySpeed * (this._sprinting ? this._sprintMultiplier : 1) * delta;
                        this._capyGroup.position.x += (dx / dist) * speed;
                        this._capyGroup.position.z += (dz / dist) * speed;
                        this._capyGroup.rotation.y = Math.atan2(dx, dz);
                        this._capyGroup.position.y = Math.abs(Math.sin(time * 14)) * 0.04;
                        if (this._capyRunAction) this._capyRunAction.timeScale = this._sprinting ? 3.5 : 2.0;
                    } else {
                        // Arrived back — score!
                        this._capyGroup.position.copy(this._capyHomePos);
                        this._capyGroup.position.y = 0;
                        this._capyGroup.rotation.y = Math.PI; // face camera
                        this._capyHasStick = false;
                        // Streak tracking
                        this._updateStreak(this._lastThrowInTarget);
                        // Check if stick landed in target zone + streak bonus
                        const basePts = this._lastThrowInTarget ? 2 : 1;
                        const streakBonus = this._getStreakBonus();
                        const pts = basePts + streakBonus;
                        this._score += pts;
                        this._updateHUD();
                        this._playScoreSound();
                        // Show floating score at capybara position
                        const popupPos = this._capyGroup.position.clone();
                        popupPos.y += 1.5;
                        this._showPlusOne(pts, popupPos);
                        // Reset stick to hand
                        this._resetStickToHand();
                        this._state = 'ready';
                        this._sprinting = false;
                        const sprintBtn = document.getElementById('fetch-sprint');
                        sprintBtn.classList.remove('visible', 'active');
                        // Move target to new random spot
                        this._randomizeTarget();
                        // Show hint again briefly
                        const hint = document.getElementById('fetch-hint');
                        if (hint && this._score <= 2) hint.style.opacity = '1';
                        if (this._capyRunAction) this._capyRunAction.timeScale = 0;
                    }
                } else {
                    // Idle — gentle sway
                    this._capyGroup.position.y = Math.sin(time * 2) * 0.015;
                    this._capyGroup.rotation.y = Math.PI + Math.sin(time * 0.8) * 0.08;
                    if (this._capyRunAction) this._capyRunAction.timeScale = 0;
                }
            }

            /* ── Render ── */
            render() {
                if (this._controls) this._controls.update();
                // Apply screen shake
                if (this._shakeIntensity > 0.001) {
                    this._camera.position.x += this._shakeOffset.x;
                    this._camera.position.y += this._shakeOffset.y;
                    this._camera.position.z += this._shakeOffset.z;
                }
                this._renderer.render(this._scene, this._camera);
                // Restore camera after shake
                if (this._shakeIntensity > 0.001) {
                    this._camera.position.x -= this._shakeOffset.x;
                    this._camera.position.y -= this._shakeOffset.y;
                    this._camera.position.z -= this._shakeOffset.z;
                }
            }

            /* ── Exit ── */
            exit() {
                this._running = false;
                this._unbindInput();
                if (this._controls) { this._controls.dispose(); this._controls = null; }
                if (this._audioCtx) { try { this._audioCtx.close(); } catch(e) {} }
                if (this._loadingEl) { this._loadingEl.remove(); this._loadingEl = null; }
                // Clean up particles
                for (const p of this._particles) { this._scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mat.dispose(); }
                this._particles.length = 0;
                document.getElementById('fetch-hud').classList.remove('active');
                document.getElementById('fetch-power-wrap').classList.remove('visible');
                document.getElementById('fetch-aim-wrap').classList.remove('visible');
                document.getElementById('fetch-sprint').classList.remove('visible', 'active');
                document.getElementById('fetch-streak').classList.remove('visible');
                if (this._onExit) this._onExit();
            }

            handleResize() {
                this._camera.aspect = window.innerWidth / window.innerHeight;
                this._camera.updateProjectionMatrix();
            }
        }

        /* ═══════════════════════════════════════════════════════════
           WALKIES — Endless Runner Mini-Game (Capybara Edition)
           ═══════════════════════════════════════════════════════════ */
        class WalkiesGame {
            constructor(renderer, onExit) {
                this._renderer = renderer;
                this._onExit = onExit;
                this._clock = new THREE.Clock();
                this._running = true;
                this._gameOver = false;
                this._loading = true;
                this._assetsTotal = 8; // capybara + 5 runner assets + tree1 + tree2
                this._assetsLoaded = 0;

                // Scoring
                this._coinCount = 0;
                this._distance = 0;
                this._lives = 1;
                this._invincibleTimer = 0;

                // Speed — progressive difficulty curve
                this._speed = 10;
                this._baseSpeed = 10;
                this._speedAccel = 0.08; // gentler initial ramp
                this._maxSpeed = 28;
                this._difficultyPhase = 0; // 0=easy, 1=medium, 2=hard, 3=insane

                // Lane system: 0=left, 1=center, 2=right
                this._laneWidth = 2.5;
                this._lanes = [-this._laneWidth, 0, this._laneWidth];
                this._currentLane = 1;
                this._targetLane = 1;
                this._playerX = 0;
                this._laneTransSpeed = 14;

                // Jump / Slide
                this._playerY = 0;
                this._playerVY = 0;
                this._jumping = false;
                this._gravity = -28;
                this._jumpForce = 9;
                this._sliding = false;
                this._slideTimer = 0;
                this._slideDuration = 0.6;
                this._groundY = 0;
                this._normalScaleY = 1;

                // Power-ups
                this._shieldActive = false;
                this._magnetActive = false;
                this._magnetTimer = 0;
                this._magnetDuration = 8;
                this._boostActive = false;
                this._boostTimer = 0;
                this._boostDuration = 5;
                this._boostSpeed = 22;

                // Object pools
                this._obstacles = [];
                this._coinObjects = [];
                this._powerUpObjects = [];
                this._groundTiles = [];
                this._pathTiles = [];
                this._sideTrees = [];
                this._sideFlowers = [];

                // Timers
                this._obstacleTimer = 0;
                this._coinTimer = 0;
                this._powerUpTimer = 0;
                this._totalTime = 0;
                this._hintTimer = 5;

                // Player mesh
                this._playerGroup = null;
                this._capyMixer = null;
                this._capyRunAction = null;
                this._contactShadow = null;
                this._capyLoaded = false;

                // Touch input
                this._touchStartX = 0;
                this._touchStartY = 0;
                this._touchStartTime = 0;
                this._swipeThreshold = 35;

                // Audio
                this._audioCtx = null;

                // Reusable vec for collision
                this._tmpVec = new THREE.Vector3();

                // Runner GLB asset templates (loaded async)
                this._runnerAssets = { road: null, mountain: null, coin: null, barrier: null, magnet: null, tree1: null, tree2: null };

                // Scene
                this._scene = new THREE.Scene();
                this._scene.fog = new THREE.Fog(0xb8d8f0, 40, 120);

                this._camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
                this._camera.position.set(0, 3.8, 10);
                this._camera.lookAt(0, 0.4, -10);

                this._setupSky();
                this._setupLighting();
                this._buildWorld();
                this._loadRunnerAssets();
                this._loadCapybara();
                this._createContactShadow();
                this._initAudio();
                this._bindInput();
                this._showHUD();
                this._showLoadingScreen();

                this._clock.start();
            }

            /* ── Loading screen ── */
            _showLoadingScreen() {
                const el = document.createElement('div');
                el.className = 'minigame-loading';
                el.id = 'walkies-loading';
                el.innerHTML = `
                    <div class="ml-bg"></div>
                    <div class="ml-content">
                        <div class="ml-icon">🚶</div>
                        <div class="ml-title">Walkies</div>
                        <div class="ml-bar"><div class="ml-fill" id="walkies-load-fill"></div></div>
                        <div class="ml-sub">lacing up the paws...</div>
                    </div>
                `;
                document.body.appendChild(el);
                this._loadingEl = el;
            }

            _updateLoadProgress() {
                this._assetsLoaded++;
                const pct = Math.min(100, Math.round((this._assetsLoaded / this._assetsTotal) * 100));
                const fill = document.getElementById('walkies-load-fill');
                if (fill) fill.style.width = pct + '%';
                if (this._assetsLoaded >= this._assetsTotal) {
                    this._finishLoading();
                }
            }

            _finishLoading() {
                this._loading = false;
                this._clock.start(); // reset clock so first delta isn't huge
                if (this._loadingEl) {
                    this._loadingEl.classList.add('fade-out');
                    setTimeout(() => { if (this._loadingEl) { this._loadingEl.remove(); this._loadingEl = null; } }, 500);
                }
            }

            /* ── Load Runner_Game GLB assets ── */
            _loadRunnerAssets() {
                const loader = new GLTFLoader();
                const basePath = 'models/Runner_Game/';
                console.log('[RunnerAssets] Starting to load 5 GLB assets...');

                // Road tile
                loader.load(basePath + 'New%20Road.glb', (gltf) => {
                    console.log('[RunnerAssets] Road GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                    this._runnerAssets.road = model;
                    this._replaceRoadWithGLB();
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Road GLB FAILED:', err); this._updateLoadProgress(); });

                // Mountain
                loader.load(basePath + 'Mountain.glb', (gltf) => {
                    console.log('[RunnerAssets] Mountain GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.receiveShadow = false; c.castShadow = false; } });
                    this._runnerAssets.mountain = model;
                    this._replaceMountainsWithGLB();
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Mountain GLB FAILED:', err); this._updateLoadProgress(); });

                // Coin
                loader.load(basePath + 'Coin.glb', (gltf) => {
                    console.log('[RunnerAssets] Coin GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
                    this._runnerAssets.coin = model;
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Coin GLB FAILED:', err); this._updateLoadProgress(); });

                // Concrete Barrier
                loader.load(basePath + 'Concrete%20Barrier.glb', (gltf) => {
                    console.log('[RunnerAssets] Barrier GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                    this._runnerAssets.barrier = model;
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Barrier GLB FAILED:', err); this._updateLoadProgress(); });

                // Magnet
                loader.load(basePath + 'Magnet.glb', (gltf) => {
                    console.log('[RunnerAssets] Magnet GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
                    this._runnerAssets.magnet = model;
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Magnet GLB FAILED:', err); this._updateLoadProgress(); });

                // Tree1
                loader.load('models/tree1.glb', (gltf) => {
                    console.log('[RunnerAssets] Tree1 GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = false; } });
                    this._runnerAssets.tree1 = model;
                    this._replaceTreesWithGLB();
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Tree1 GLB FAILED:', err); this._updateLoadProgress(); });

                // Tree2
                loader.load('models/tree2.glb', (gltf) => {
                    console.log('[RunnerAssets] Tree2 GLB loaded OK');
                    const model = gltf.scene;
                    model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = false; } });
                    this._runnerAssets.tree2 = model;
                    this._replaceTreesWithGLB();
                    this._updateLoadProgress();
                }, undefined, (err) => { console.warn('[RunnerAssets] Tree2 GLB FAILED:', err); this._updateLoadProgress(); });
            }

            /* ── Replace procedural road with GLB tiles once loaded ── */
            _replaceRoadWithGLB() {
                const template = this._runnerAssets.road;
                if (!template) return;

                // Measure template
                template.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(template);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                console.log('[Road GLB] raw size:', JSON.stringify({x: size.x.toFixed(2), y: size.y.toFixed(2), z: size.z.toFixed(2)}));
                console.log('[Road GLB] raw center:', JSON.stringify({x: center.x.toFixed(2), y: center.y.toFixed(2), z: center.z.toFixed(2)}));

                // Determine road orientation: the road length (seamless direction) is the largest XZ dimension
                // Road width (across lanes) is the smaller XZ dimension
                const roadW = this._laneWidth * 3 + 1.6; // 9.1 target width
                let modelWidth, modelLength, needsRotation;
                if (size.x >= size.z) {
                    // Road runs along X in the model — need to rotate 90° to run along -Z
                    modelWidth = size.z;
                    modelLength = size.x;
                    needsRotation = true;
                } else {
                    // Road runs along Z already
                    modelWidth = size.x;
                    modelLength = size.z;
                    needsRotation = false;
                }
                
                const scaleFactor = roadW / (modelWidth || 1);
                const tileLength = modelLength * scaleFactor;
                console.log('[Road GLB] needsRotation:', needsRotation, 'scaleFactor:', scaleFactor.toFixed(3), 'tileLength:', tileLength.toFixed(2));

                // Remove old procedural road tiles, shoulders, edges
                for (const t of this._pathTiles) this._scene.remove(t);
                this._pathTiles = [];
                for (const s of (this._shoulderTiles || [])) this._scene.remove(s);
                this._shoulderTiles = [];
                for (const e of (this._edgeLines || [])) this._scene.remove(e);
                this._edgeLines = [];
                for (const d of (this._laneDividers || [])) this._scene.remove(d);
                this._laneDividers = [];

                // Spawn enough tiles to cover the visible range (camera sees ~100 units behind and ahead)
                this._roadGLBTiles = [];
                const tilesNeeded = Math.ceil(300 / tileLength) + 2;
                // Road surface should be at y=0 — offset so the top of the model sits at ground level
                const roadTopY = box.max.y * scaleFactor;
                const roadYOffset = -roadTopY;
                console.log('[Road GLB] roadTopY:', roadTopY.toFixed(3), 'roadYOffset:', roadYOffset.toFixed(3));
                for (let i = 0; i < tilesNeeded; i++) {
                    const clone = template.clone();
                    clone.scale.setScalar(scaleFactor);
                    if (needsRotation) clone.rotation.y = Math.PI / 2;
                    // Place tiles end-to-end along -Z, with top surface at y=0
                    clone.position.set(0, roadYOffset, -i * tileLength + tileLength);
                    this._scene.add(clone);
                    this._roadGLBTiles.push({ mesh: clone, length: tileLength });
                }
                console.log('[Road GLB] Placed', tilesNeeded, 'tiles');
            }

            /* ── Replace procedural mountains with GLB once loaded ── */
            _replaceMountainsWithGLB() {
                const template = this._runnerAssets.mountain;
                if (!template) return;
                console.log('[Mountain GLB] loaded, replacing procedural mountains');
                template.updateMatrixWorld(true);
                const mBox = new THREE.Box3().setFromObject(template);
                console.log('[Mountain GLB] size:', mBox.getSize(new THREE.Vector3()));

                // Remove old procedural mountains
                for (const m of (this._mountains || [])) this._scene.remove(m);
                this._mountains = [];

                // Measure template
                const box = new THREE.Box3().setFromObject(template);
                const size = box.getSize(new THREE.Vector3());

                // Place mountain ranges in the background
                this._mountainGLBs = [];
                const positions = [
                    { x: -40, z: -95, s: 1.0 },
                    { x: -5, z: -115, s: 1.3 },
                    { x: 35, z: -100, s: 0.9 },
                    { x: 55, z: -90, s: 0.7 },
                    { x: -60, z: -88, s: 0.6 },
                    { x: -25, z: -108, s: 1.1 },
                    { x: 15, z: -112, s: 1.0 },
                ];
                for (const p of positions) {
                    const clone = template.clone();
                    clone.scale.setScalar(p.s);
                    clone.position.set(p.x, 0, p.z);
                    clone.rotation.y = Math.random() * Math.PI * 2;
                    this._scene.add(clone);
                    this._mountainGLBs.push(clone);
                }
            }

            /* ── Replace procedural side trees with GLB models ── */
            _replaceTreesWithGLB() {
                if (!this._runnerAssets.tree1 || !this._runnerAssets.tree2) return;
                if (this._treesReplaced) return;
                this._treesReplaced = true;
                console.log('[Trees GLB] Replacing procedural trees with GLB models');

                // Remove old procedural trees
                for (const t of this._sideTrees) this._scene.remove(t);
                this._sideTrees = [];

                const trees = [this._runnerAssets.tree1, this._runnerAssets.tree2];
                const roadW = this._laneWidth * 3 + 1.6;
                const shoulderW = 1.2;
                const totalPathW = roadW + shoulderW * 2;

                for (let z = 12; z > -135; z -= 4.5) {
                    for (const xSide of [-1, 1]) {
                        if (Math.random() > 0.75) continue;
                        const src = trees[Math.floor(Math.random() * trees.length)];
                        const clone = src.clone();
                        const scale = 0.15 + Math.random() * 0.12; // trees are ~9m tall, scale down
                        clone.scale.setScalar(scale);
                        const xBase = xSide * (totalPathW / 2 + 1.5 + Math.random() * 4);
                        const zOff = (Math.random() - 0.5) * 2;
                        clone.position.set(xBase, 0, z + zOff);
                        clone.rotation.y = Math.random() * Math.PI * 2;
                        this._scene.add(clone);
                        this._sideTrees.push(clone);
                    }
                }
            }

            /* ── Sky gradient (GLSL shader sphere) ── */
            _setupSky() {
                const skyGeo = new THREE.SphereGeometry(180, 16, 12);
                const skyMat = new THREE.ShaderMaterial({
                    uniforms: {
                        topColor: { value: new THREE.Color(0x4a90d9) },
                        bottomColor: { value: new THREE.Color(0xd4e8f5) },
                        offset: { value: 20 },
                        exponent: { value: 0.4 },
                    },
                    vertexShader: `
                        varying vec3 vWorldPosition;
                        void main() {
                            vec4 wp = modelMatrix * vec4(position, 1.0);
                            vWorldPosition = wp.xyz;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 topColor;
                        uniform vec3 bottomColor;
                        uniform float offset;
                        uniform float exponent;
                        varying vec3 vWorldPosition;
                        void main() {
                            float h = normalize(vWorldPosition + vec3(0.0, offset, 0.0)).y;
                            gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                        }
                    `,
                    side: THREE.BackSide,
                    depthWrite: false,
                });
                this._skyMesh = new THREE.Mesh(skyGeo, skyMat);
                this._skyMat = skyMat;
                this._scene.add(this._skyMesh);
            }

            /* ── Lighting ── */
            _setupLighting() {
                const hemi = new THREE.HemisphereLight(0x99ccff, 0x44882a, 0.9);
                this._scene.add(hemi);

                this._sun = new THREE.DirectionalLight(0xfff4d6, 1.1);
                this._sun.position.set(8, 18, 10);
                this._sun.castShadow = true;
                this._sun.shadow.mapSize.set(512, 512);
                this._sun.shadow.camera.left = -20;
                this._sun.shadow.camera.right = 20;
                this._sun.shadow.camera.top = 20;
                this._sun.shadow.camera.bottom = -20;
                this._sun.shadow.camera.near = 1;
                this._sun.shadow.camera.far = 50;
                this._sun.shadow.bias = -0.002;
                this._scene.add(this._sun);

                this._scene.add(new THREE.AmbientLight(0x607868, 0.5));
            }

            /* ── World construction ── */
            _buildWorld() {
                const roadW = this._laneWidth * 3 + 1.6;
                const shoulderW = 1.2;
                const totalPathW = roadW + shoulderW * 2;

                // Ground — wide green area
                const groundGeo = new THREE.PlaneGeometry(80, 100);
                const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3a });
                for (let i = 0; i < 3; i++) {
                    const tile = new THREE.Mesh(groundGeo, groundMat);
                    tile.rotation.x = -Math.PI / 2;
                    tile.position.set(0, -0.03, -i * 100 + 50);
                    tile.receiveShadow = true;
                    this._scene.add(tile);
                    this._groundTiles.push(tile);
                }

                // Dirt road (center)
                const pathGeo = new THREE.PlaneGeometry(roadW, 100);
                const pathMat = new THREE.MeshLambertMaterial({ color: 0x9B8763 });
                for (let i = 0; i < 3; i++) {
                    const path = new THREE.Mesh(pathGeo, pathMat);
                    path.rotation.x = -Math.PI / 2;
                    path.position.set(0, -0.01, -i * 100 + 50);
                    path.receiveShadow = true;
                    this._scene.add(path);
                    this._pathTiles.push(path);
                }

                // Grass shoulders alongside the road (smooth transition)
                this._shoulderTiles = [];
                const shoulderGeo = new THREE.PlaneGeometry(shoulderW, 100);
                const shoulderMat = new THREE.MeshLambertMaterial({ color: 0x6da85a });
                for (let i = 0; i < 3; i++) {
                    for (const side of [-1, 1]) {
                        const shoulder = new THREE.Mesh(shoulderGeo, shoulderMat);
                        shoulder.rotation.x = -Math.PI / 2;
                        shoulder.position.set(side * (roadW / 2 + shoulderW / 2), -0.015, -i * 100 + 50);
                        shoulder.receiveShadow = true;
                        this._scene.add(shoulder);
                        this._shoulderTiles.push(shoulder);
                    }
                }

                // Road edge lines (solid thin strips)
                this._edgeLines = [];
                const edgeGeo = new THREE.PlaneGeometry(0.08, 100);
                const edgeMat = new THREE.MeshBasicMaterial({ color: 0xb8a47a, transparent: true, opacity: 0.5 });
                for (let i = 0; i < 3; i++) {
                    for (const side of [-1, 1]) {
                        const edge = new THREE.Mesh(edgeGeo, edgeMat);
                        edge.rotation.x = -Math.PI / 2;
                        edge.position.set(side * roadW / 2, 0.001, -i * 100 + 50);
                        this._scene.add(edge);
                        this._edgeLines.push(edge);
                    }
                }

                // Lane dividers (subtle dashed lines)
                const divMat = new THREE.MeshBasicMaterial({ color: 0xc4b08a, transparent: true, opacity: 0.25 });
                this._laneDividers = [];
                for (const lx of [-this._laneWidth, this._laneWidth]) {
                    for (let z = 10; z > -120; z -= 4) {
                        const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 1.6), divMat);
                        dash.rotation.x = -Math.PI / 2;
                        dash.position.set(lx, 0.003, z);
                        this._scene.add(dash);
                        this._laneDividers.push(dash);
                    }
                }

                // Side trees — varied sizes, better proportions, grouped as trunk+canopy
                const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4d28 });
                const leafMats = [
                    new THREE.MeshLambertMaterial({ color: 0x3d8a3a }),
                    new THREE.MeshLambertMaterial({ color: 0x2e7a2e }),
                    new THREE.MeshLambertMaterial({ color: 0x4a9648 }),
                    new THREE.MeshLambertMaterial({ color: 0x358035 }),
                ];
                const treeTypes = [
                    // Tall pine-like: narrow trunk, conical canopy
                    { trunkR: [0.08, 0.12], trunkH: 1.6, canopyGeo: () => new THREE.ConeGeometry(0.6, 2.0, 7), canopyY: 2.4 },
                    // Round bushy: thicker trunk, sphere canopy — canopy sits snug on trunk
                    { trunkR: [0.1, 0.15], trunkH: 1.2, canopyGeo: () => new THREE.SphereGeometry(0.8, 8, 6), canopyY: 1.7 },
                    // Tall oak-like: medium trunk, elongated sphere canopy
                    { trunkR: [0.1, 0.14], trunkH: 2.0, canopyGeo: () => { const g = new THREE.SphereGeometry(0.7, 8, 6); g.scale(1, 1.3, 1); return g; }, canopyY: 2.6 },
                ];
                for (let z = 12; z > -135; z -= 4.5) {
                    for (const xSide of [-1, 1]) {
                        if (Math.random() > 0.75) continue; // skip some for variation
                        const tt = treeTypes[Math.floor(Math.random() * treeTypes.length)];
                        const scale = 0.7 + Math.random() * 0.6;
                        const xBase = xSide * (totalPathW / 2 + 1.5 + Math.random() * 4);
                        const zOff = (Math.random() - 0.5) * 2;

                        const trunkGeo = new THREE.CylinderGeometry(tt.trunkR[0], tt.trunkR[1], tt.trunkH, 6);
                        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                        trunk.position.set(xBase, tt.trunkH * scale / 2, z + zOff);
                        trunk.scale.setScalar(scale);
                        trunk.castShadow = true;
                        this._scene.add(trunk);
                        this._sideTrees.push(trunk);

                        const canopyGeo = tt.canopyGeo();
                        const leaves = new THREE.Mesh(canopyGeo || new THREE.SphereGeometry(0.7, 8, 6), leafMats[Math.floor(Math.random() * leafMats.length)]);
                        leaves.position.set(xBase, tt.canopyY * scale, z + zOff);
                        leaves.scale.setScalar(scale * (0.85 + Math.random() * 0.3));
                        leaves.castShadow = true;
                        this._scene.add(leaves);
                        this._sideTrees.push(leaves);
                    }
                }

                // Bushes — low hedges along road shoulders
                this._sideBushes = [];
                const bushGeo = new THREE.SphereGeometry(0.4, 6, 5);
                const bushMats = [
                    new THREE.MeshLambertMaterial({ color: 0x3a7a38 }),
                    new THREE.MeshLambertMaterial({ color: 0x4d8f48 }),
                ];
                for (let z = 12; z > -135; z -= 3) {
                    for (const xSide of [-1, 1]) {
                        if (Math.random() > 0.4) continue;
                        const xBase = xSide * (totalPathW / 2 + 0.3 + Math.random() * 0.8);
                        const bush = new THREE.Mesh(bushGeo, bushMats[Math.floor(Math.random() * bushMats.length)]);
                        const s = 0.5 + Math.random() * 0.5;
                        bush.scale.set(s * (0.8 + Math.random() * 0.4), s * 0.7, s * (0.8 + Math.random() * 0.4));
                        bush.position.set(xBase, s * 0.2, z + (Math.random() - 0.5) * 1.5);
                        this._scene.add(bush);
                        this._sideBushes.push(bush);
                    }
                }

                // Side flowers (small colored dots)
                const flowerColors = [0xe88ca5, 0xf0d458, 0xb088e0, 0x70c0e8, 0xf09848, 0xf0e060];
                const flowerGeo = new THREE.SphereGeometry(0.1, 5, 4);
                for (let z = 12; z > -135; z -= 2.5) {
                    for (const xSide of [-1, 1]) {
                        if (Math.random() > 0.45) continue;
                        const xBase = xSide * (totalPathW / 2 + 0.8 + Math.random() * 5);
                        const fMat = new THREE.MeshLambertMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)] });
                        const flower = new THREE.Mesh(flowerGeo, fMat);
                        flower.position.set(xBase, 0.1, z + (Math.random() - 0.5) * 1.5);
                        this._scene.add(flower);
                        this._sideFlowers.push(flower);
                    }
                }

                // Grass tufts — scattered thin triangles in the grass area
                this._grassTufts = [];
                const grassTuftGeo = new THREE.ConeGeometry(0.06, 0.25, 4);
                const grassMat1 = new THREE.MeshLambertMaterial({ color: 0x5a9e4b });
                const grassMat2 = new THREE.MeshLambertMaterial({ color: 0x68ad58 });
                for (let z = 12; z > -135; z -= 1.5) {
                    for (const xSide of [-1, 1]) {
                        if (Math.random() > 0.5) continue;
                        const xBase = xSide * (totalPathW / 2 + 0.5 + Math.random() * 6);
                        const tuft = new THREE.Mesh(grassTuftGeo, Math.random() > 0.5 ? grassMat1 : grassMat2);
                        tuft.position.set(xBase, 0.12, z + (Math.random() - 0.5) * 1);
                        tuft.rotation.set(0, Math.random() * Math.PI, (Math.random() - 0.5) * 0.3);
                        this._scene.add(tuft);
                        this._grassTufts.push(tuft);
                    }
                }

                // Mountain silhouettes (background) — softer, layered
                this._mountains = [];
                const mtData = [
                    { x: -40, z: -95, w: 45, h: 30 },
                    { x: -5, z: -110, w: 55, h: 38 },
                    { x: 35, z: -100, w: 40, h: 28 },
                    { x: 55, z: -90, w: 30, h: 22 },
                    { x: -60, z: -88, w: 28, h: 20 },
                    { x: -25, z: -105, w: 35, h: 26 },
                    { x: 15, z: -108, w: 38, h: 30 },
                ];
                for (const m of mtData) {
                    const shape = new THREE.Shape();
                    shape.moveTo(-m.w / 2, 0);
                    shape.quadraticCurveTo(-m.w * 0.2, m.h * 0.85, 0, m.h);
                    shape.quadraticCurveTo(m.w * 0.25, m.h * 0.75, m.w / 2, 0);
                    shape.closePath();
                    const mtGeo = new THREE.ShapeGeometry(shape);
                    const mtMat = new THREE.MeshBasicMaterial({
                        color: new THREE.Color().setHSL(0.55 + Math.random() * 0.06, 0.12, 0.52 + Math.random() * 0.1),
                        fog: true, transparent: true, opacity: 0.45 + Math.random() * 0.15,
                    });
                    const mtMesh = new THREE.Mesh(mtGeo, mtMat);
                    mtMesh.position.set(m.x, 0, m.z);
                    this._scene.add(mtMesh);
                    this._mountains.push(mtMesh);
                }

            }

            /* ── Contact shadow ── */
            _createContactShadow() {
                const geo = new THREE.CircleGeometry(0.35, 16);
                const mat = new THREE.MeshBasicMaterial({
                    color: 0x000000, transparent: true, opacity: 0.22, depthWrite: false,
                });
                this._contactShadow = new THREE.Mesh(geo, mat);
                this._contactShadow.rotation.x = -Math.PI / 2;
                this._contactShadow.position.set(0, 0.02, 0);
                this._scene.add(this._contactShadow);
            }

            /* ── Load real capybara model ── */
            _loadCapybara() {
                const loader = new GLTFLoader();
                loader.load('models/capybara-rigged.glb', (gltf) => {
                    if (this._playerGroup) {
                        this._scene.remove(this._playerGroup);
                    }

                    const model = gltf.scene;
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const targetHeight = 0.55;
                    const scaleFactor = targetHeight / (size.y || 0.001);
                    model.scale.setScalar(scaleFactor);
                    model.position.set(0, this._groundY, 0);
                    model.rotation.y = Math.PI;
                    model.traverse(c => {
                        if (c.isMesh) { c.castShadow = true; c.receiveShadow = false; }
                    });

                    const group = new THREE.Group();
                    group.add(model);
                    group.position.set(0, this._groundY, 0);
                    this._playerGroup = group;
                    this._scene.add(group);
                    this._capyLoaded = true;
                    this._createShieldBubble();

                    if (gltf.animations && gltf.animations.length > 0) {
                        this._capyMixer = new THREE.AnimationMixer(model);
                        this._capyRunAction = this._capyMixer.clipAction(gltf.animations[0]);
                        this._capyRunAction.play();
                        this._capyRunAction.timeScale = 1.5;
                    }
                    this._updateLoadProgress();
                }, undefined, (err) => {
                    console.warn('Walkies: capybara model failed', err);
                    this._updateLoadProgress();
                });
            }

            /* ── Shield force field bubble ── */
            _createShieldBubble() {
                if (this._shieldBubble) {
                    if (this._shieldBubble.parent) this._shieldBubble.parent.remove(this._shieldBubble);
                }
                const geo = new THREE.SphereGeometry(0.5, 32, 24);
                const mat = new THREE.MeshPhongMaterial({
                    color: 0x44aaff,
                    emissive: 0x2266cc,
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.0,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                    shininess: 120,
                });
                this._shieldBubble = new THREE.Mesh(geo, mat);
                this._shieldBubble.position.y = 0.3;
                this._shieldBubble.renderOrder = 999;
                this._shieldBubble.visible = false;
                if (this._playerGroup) this._playerGroup.add(this._shieldBubble);
            }

            _updateShieldBubble(delta, time) {
                if (!this._shieldBubble) return;
                const targetOpacity = this._shieldActive ? 0.22 : 0.0;
                const mat = this._shieldBubble.material;
                mat.opacity = THREE.MathUtils.lerp(mat.opacity, targetOpacity, delta * 6);
                this._shieldBubble.visible = mat.opacity > 0.005;
                if (this._shieldBubble.visible) {
                    // Gentle pulse
                    const pulse = 1.0 + Math.sin(time * 4) * 0.06;
                    this._shieldBubble.scale.setScalar(pulse);
                    mat.emissiveIntensity = 0.3 + Math.sin(time * 3) * 0.15;
                    this._shieldBubble.rotation.y += delta * 0.5;
                }
            }

            /* ── Procedural audio (Web Audio API) ── */
            _initAudio() {
                try {
                    this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    // Master gain for all walkies sounds
                    this._masterGain = this._audioCtx.createGain();
                    this._masterGain.gain.value = 1.0;
                    this._masterGain.connect(this._audioCtx.destination);
                } catch(e) {}
                this._footstepTimer = 0;
            }

            _resumeAudio() {
                if (this._audioCtx && this._audioCtx.state === 'suspended') this._audioCtx.resume();
            }

            _playFootstepSound() {
                if (!this._audioCtx || !this._masterGain) return;
                const ctx = this._audioCtx;
                const t = ctx.currentTime;
                // Short thud
                const bufSize = Math.floor(ctx.sampleRate * 0.04);
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize) * 0.6;
                const src = ctx.createBufferSource();
                src.buffer = buf;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.05);
                const filt = ctx.createBiquadFilter();
                filt.type = 'lowpass'; filt.frequency.value = 600;
                src.connect(filt).connect(gain).connect(this._masterGain);
                src.start();
            }

            _playPhaseSound() {
                if (!this._audioCtx || !this._masterGain) return;
                const ctx = this._audioCtx; const t = ctx.currentTime;
                // Ascending warning chime — 3 quick rising tones
                const freqs = [440, 554, 659];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    const start = t + i * 0.1;
                    gain.gain.setValueAtTime(0, start);
                    gain.gain.linearRampToValueAtTime(0.3, start + 0.03);
                    gain.gain.linearRampToValueAtTime(0, start + 0.2);
                    osc.connect(gain).connect(this._masterGain);
                    osc.start(start); osc.stop(start + 0.2);
                });
            }

            _playJumpSound() {
                if (!this._audioCtx || !this._masterGain) return;
                this._resumeAudio();
                const ctx = this._audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(320, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(640, ctx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.35, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.18);
                osc.connect(gain).connect(this._masterGain);
                osc.start(); osc.stop(ctx.currentTime + 0.18);
            }

            _playSlideSound() {
                if (!this._audioCtx || !this._masterGain) return;
                this._resumeAudio();
                const ctx = this._audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.25, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                osc.connect(gain).connect(this._masterGain);
                osc.start(); osc.stop(ctx.currentTime + 0.25);
            }

            _playCoinSound() {
                if (!this._audioCtx || !this._masterGain) return;
                this._resumeAudio();
                const ctx = this._audioCtx;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.setValueAtTime(1100, t + 0.06);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.15);
                osc.connect(gain).connect(this._masterGain);
                osc.start(); osc.stop(t + 0.15);
            }

            _playHitSound() {
                if (!this._audioCtx || !this._masterGain) return;
                this._resumeAudio();
                const ctx = this._audioCtx;
                const t = ctx.currentTime;
                const bufSize = Math.floor(ctx.sampleRate * 0.2);
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
                const src = ctx.createBufferSource();
                src.buffer = buf;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.2);
                const filt = ctx.createBiquadFilter();
                filt.type = 'lowpass'; filt.frequency.value = 500;
                src.connect(filt).connect(gain).connect(this._masterGain);
                src.start();
            }

            _playPowerUpSound() {
                if (!this._audioCtx || !this._masterGain) return;
                this._resumeAudio();
                const ctx = this._audioCtx;
                const t = ctx.currentTime;
                [523, 659, 784].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, t + i * 0.08);
                    gain.gain.linearRampToValueAtTime(0.25, t + i * 0.08 + 0.04);
                    gain.gain.linearRampToValueAtTime(0, t + i * 0.08 + 0.2);
                    osc.connect(gain).connect(this._masterGain);
                    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.2);
                });
            }

            /* ── Input binding ── */
            _bindInput() {
                this._onKeyDown = (e) => {
                    if (this._gameOver || this._loading) return;
                    switch (e.code) {
                        case 'ArrowLeft': case 'KeyA': e.preventDefault(); this._moveLeft(); break;
                        case 'ArrowRight': case 'KeyD': e.preventDefault(); this._moveRight(); break;
                        case 'ArrowUp': case 'KeyW': case 'Space': e.preventDefault(); this._jump(); break;
                        case 'ArrowDown': case 'KeyS': e.preventDefault(); this._slide(); break;
                    }
                };
                this._onTouchStart = (e) => {
                    this._resumeAudio();
                    if (e.target.closest('#walkies-hud button, #walkies-gameover')) return;
                    const touch = e.touches[0];
                    this._touchStartX = touch.clientX;
                    this._touchStartY = touch.clientY;
                    this._touchStartTime = performance.now();
                    this._touchMoved = false;
                };
                this._onTouchMove = (e) => {
                    this._touchMoved = true;
                };
                this._onTouchEnd = (e) => {
                    if (e.target.closest('#walkies-hud button, #walkies-gameover')) return;
                    if (this._gameOver || this._loading) return;
                    const touch = e.changedTouches[0];
                    const dx = touch.clientX - this._touchStartX;
                    const dy = touch.clientY - this._touchStartY;
                    const elapsed = performance.now() - this._touchStartTime;

                    if (!this._touchMoved || (Math.abs(dx) < this._swipeThreshold && Math.abs(dy) < this._swipeThreshold)) {
                        // Tap = jump
                        this._jump();
                        return;
                    }

                    if (Math.abs(dx) > Math.abs(dy)) {
                        // Horizontal swipe
                        if (dx > this._swipeThreshold) this._moveRight();
                        else if (dx < -this._swipeThreshold) this._moveLeft();
                    } else {
                        // Vertical swipe
                        if (dy < -this._swipeThreshold) this._jump();
                        else if (dy > this._swipeThreshold) this._slide();
                    }
                };
                window.addEventListener('keydown', this._onKeyDown);
                window.addEventListener('touchstart', this._onTouchStart, { passive: true });
                window.addEventListener('touchmove', this._onTouchMove, { passive: true });
                window.addEventListener('touchend', this._onTouchEnd, { passive: true });

                // HUD buttons
                document.getElementById('walkies-back').addEventListener('click', () => this.exit());
                document.getElementById('walkies-retry').addEventListener('click', () => this.restart());
                document.getElementById('walkies-home').addEventListener('click', () => this.exit());
            }

            _unbindInput() {
                window.removeEventListener('keydown', this._onKeyDown);
                window.removeEventListener('touchstart', this._onTouchStart);
                window.removeEventListener('touchmove', this._onTouchMove);
                window.removeEventListener('touchend', this._onTouchEnd);
            }

            /* ── Player actions ── */
            _moveLeft() {
                this._resumeAudio();
                if (this._targetLane > 0) this._targetLane--;
            }

            _moveRight() {
                this._resumeAudio();
                if (this._targetLane < 2) this._targetLane++;
            }

            _jump() {
                this._resumeAudio();
                if (this._gameOver) return;
                if (this._sliding) {
                    this._sliding = false;
                    this._slideTimer = 0;
                }
                if (!this._jumping) {
                    this._jumping = true;
                    this._playerVY = this._jumpForce;
                    this._playJumpSound();
                }
            }

            _slide() {
                this._resumeAudio();
                if (this._gameOver) return;
                if (this._jumping) return;
                if (!this._sliding) {
                    this._sliding = true;
                    this._slideTimer = 0;
                    this._playSlideSound();
                }
            }

            /* ── HUD ── */
            _showHUD() {
                document.getElementById('walkies-hud').classList.add('active');
                document.getElementById('walkies-gameover').classList.remove('visible');
                document.getElementById('walkies-back').style.display = 'none';
                this._updateHUD();
            }

            _updateHUD() {
                document.getElementById('walkies-coin-count').textContent = this._coinCount;
                document.getElementById('walkies-dist-val').textContent = Math.floor(this._distance);
                // Lives hearts
                let hearts = '';
                for (let i = 0; i < 1; i++) hearts += i < this._lives ? '❤️' : '🖤';
                document.getElementById('walkies-lives').innerHTML = hearts;
                // Power-up icons
                document.getElementById('wp-shield').classList.toggle('active', this._shieldActive);
                document.getElementById('wp-magnet').classList.toggle('active', this._magnetActive);
                document.getElementById('wp-boost').classList.toggle('active', this._boostActive);
            }

            /* ── Spawning ── */
            _spawnObstacle() {
                const lane = Math.floor(Math.random() * 3);
                // More overhead obstacles at higher difficulty (forces varied inputs)
                const overheadChance = this._difficultyPhase >= 3 ? 0.45 : this._difficultyPhase >= 2 ? 0.4 : 0.35;
                const type = Math.random(); // below threshold = ground, above = overhead

                const group = new THREE.Group();

                if (type >= overheadChance) {
                    // Ground obstacle — Concrete Barrier GLB or fallback
                    if (this._runnerAssets.barrier) {
                        const clone = this._runnerAssets.barrier.clone();
                        clone.updateMatrixWorld(true);
                        // Scale barrier to visible size (~0.8 tall)
                        const box = new THREE.Box3().setFromObject(clone);
                        const size = box.getSize(new THREE.Vector3());
                        const targetH = 0.8;
                        const s = targetH / (size.y || 1);
                        clone.scale.setScalar(s);
                        clone.updateMatrixWorld(true);
                        // Recenter at base
                        const boxS = new THREE.Box3().setFromObject(clone);
                        clone.position.y = -boxS.min.y;
                        group.add(clone);
                    } else {
                        // Procedural fallback
                        const geo = new THREE.BoxGeometry(0.8, 0.5, 0.6);
                        const mat = new THREE.MeshLambertMaterial({ color: 0xd44040 });
                        const box = new THREE.Mesh(geo, mat);
                        box.position.y = 0.25;
                        box.castShadow = true;
                        group.add(box);
                        for (let i = 0; i < 3; i++) {
                            const spike = new THREE.Mesh(
                                new THREE.ConeGeometry(0.08, 0.25, 4),
                                new THREE.MeshLambertMaterial({ color: 0xb03030 })
                            );
                            spike.position.set((i - 1) * 0.22, 0.58, 0);
                            group.add(spike);
                        }
                    }
                    group.userData.type = 'ground';
                    group.userData.hitH = 0.8;
                } else {
                    // Overhead obstacle — hanging vine/sign (slide under)
                    const barGeo = new THREE.BoxGeometry(1.4, 0.2, 0.2);
                    const barMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
                    const bar = new THREE.Mesh(barGeo, barMat);
                    bar.position.y = 1.2;
                    bar.castShadow = true;
                    group.add(bar);
                    // Hanging vines
                    const vineMat = new THREE.MeshLambertMaterial({ color: 0x3a8030 });
                    for (let i = -2; i <= 2; i++) {
                        const vine = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 4), vineMat);
                        vine.position.set(i * 0.25, 0.85, 0);
                        group.add(vine);
                    }
                    group.userData.type = 'overhead';
                    group.userData.hitH = 1.3;
                }

                group.position.set(this._lanes[lane], 0, -70);
                group.userData.lane = lane;
                this._scene.add(group);
                this._obstacles.push(group);
            }

            _spawnCoinGroup() {
                const lane = Math.floor(Math.random() * 3);
                const count = 1 + Math.floor(Math.random() * 4); // 1-4 coins
                const isArc = count >= 3 && Math.random() > 0.5;

                for (let i = 0; i < count; i++) {
                    let coinObj;
                    if (this._runnerAssets.coin) {
                        coinObj = this._runnerAssets.coin.clone();
                        coinObj.updateMatrixWorld(true);
                        // Scale coin to ~0.55m diameter
                        const box = new THREE.Box3().setFromObject(coinObj);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z) || 1;
                        const s = 0.55 / maxDim;
                        coinObj.scale.setScalar(s);
                    } else {
                        // Procedural fallback
                        const geo = new THREE.CylinderGeometry(0.16, 0.16, 0.05, 12);
                        const mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.15, emissive: 0x886600, emissiveIntensity: 0.15 });
                        coinObj = new THREE.Mesh(geo, mat);
                        coinObj.rotation.z = Math.PI / 2;
                    }
                    const yPos = isArc ? 0.4 + Math.sin(i / (count - 1) * Math.PI) * 1.2 : 0.4;
                    coinObj.position.set(this._lanes[lane], yPos, -70 - i * 2.5);
                    coinObj.castShadow = true;
                    coinObj.userData.lane = lane;
                    coinObj.userData.isGLB = !!this._runnerAssets.coin;
                    this._scene.add(coinObj);
                    this._coinObjects.push(coinObj);
                }
            }

            _spawnPowerUp() {
                const lane = Math.floor(Math.random() * 3);
                const types = ['shield', 'magnet', 'boost'];
                const type = types[Math.floor(Math.random() * types.length)];
                const colors = { shield: 0x4488ff, magnet: 0xcc44ff, boost: 0x44ff88 };

                const group = new THREE.Group();

                if (type === 'magnet' && this._runnerAssets.magnet) {
                    // Use Magnet GLB
                    const clone = this._runnerAssets.magnet.clone();
                    clone.updateMatrixWorld(true);
                    const box = new THREE.Box3().setFromObject(clone);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z) || 1;
                    const s = 0.55 / maxDim;
                    clone.scale.setScalar(s);
                    // Position so bottom is at y=0.4
                    const boxS = new THREE.Box3().setFromObject(clone);
                    clone.position.y = 0.4 - boxS.min.y;
                    group.add(clone);

                    // Subtle glow ring
                    const ringGeo = new THREE.TorusGeometry(0.35, 0.04, 8, 24);
                    const ringMat = new THREE.MeshBasicMaterial({ color: colors[type], transparent: true, opacity: 0.4 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.position.y = 0.7;
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                } else {
                    // Procedural for shield/boost (and magnet fallback)
                    const geo = new THREE.OctahedronGeometry(0.3, 0);
                    const mat = new THREE.MeshStandardMaterial({
                        color: colors[type], metalness: 0.3, roughness: 0.4,
                        emissive: colors[type], emissiveIntensity: 0.4,
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.y = 0.7;
                    mesh.castShadow = true;
                    group.add(mesh);

                    // Glow ring
                    const ringGeo = new THREE.TorusGeometry(0.35, 0.04, 8, 24);
                    const ringMat = new THREE.MeshBasicMaterial({ color: colors[type], transparent: true, opacity: 0.4 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.position.y = 0.7;
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                }

                group.position.set(this._lanes[lane], 0, -70);
                group.userData.type = type;
                group.userData.lane = lane;
                this._scene.add(group);
                this._powerUpObjects.push(group);
            }

            /* ── Main update loop ── */
            update() {
                if (!this._running || this._gameOver) return;
                if (this._loading) return;

                const delta = Math.min(this._clock.getDelta(), 0.05); // cap delta
                const time = this._clock.elapsedTime;
                this._totalTime += delta;

                // Speed ramp — progressive difficulty curve
                // Phase 0 (0-30s): gentle, Phase 1 (30-60s): medium, Phase 2 (60-120s): hard, Phase 3 (120s+): insane
                const t = this._totalTime;
                let accel;
                if (t < 30) {
                    accel = 0.06;
                    this._difficultyPhase = 0;
                } else if (t < 60) {
                    accel = 0.1;
                    this._difficultyPhase = 1;
                } else if (t < 120) {
                    accel = 0.15;
                    this._difficultyPhase = 2;
                } else {
                    accel = 0.18;
                    this._difficultyPhase = 3;
                }
                this._speed = Math.min(this._baseSpeed + this._totalTime * accel, this._maxSpeed);
                const effectiveSpeed = this._boostActive ? this._boostSpeed : this._speed;
                const scrollDist = effectiveSpeed * delta;

                // Show difficulty phase transition badge
                if (this._difficultyPhase !== (this._prevDiffPhase || 0) && this._difficultyPhase > 0) {
                    this._prevDiffPhase = this._difficultyPhase;
                    const badge = document.getElementById('walkies-speed-badge');
                    if (badge) {
                        const labels = ['', '⚡ Picking Up!', '🔥 Getting Fast!', '💀 INSANE!'];
                        const colors = ['', 'rgba(255,180,50,0.7)', 'rgba(255,80,50,0.7)', 'rgba(200,30,30,0.8)'];
                        badge.textContent = labels[this._difficultyPhase];
                        badge.style.background = colors[this._difficultyPhase];
                        badge.classList.remove('show');
                        void badge.offsetWidth; // force reflow
                        badge.classList.add('show');
                        this._playPhaseSound();
                        setTimeout(() => badge.classList.remove('show'), 2500);
                    }
                }
                if (!this._prevDiffPhase) this._prevDiffPhase = 0;

                // Distance
                this._distance += scrollDist;

                // Hint fade
                if (this._hintTimer > 0) {
                    this._hintTimer -= delta;
                    if (this._hintTimer <= 0) {
                        const hint = document.getElementById('walkies-tap-hint');
                        if (hint) hint.style.opacity = '0';
                    }
                }

                // Invincibility timer
                if (this._invincibleTimer > 0) {
                    this._invincibleTimer -= delta;
                    if (this._playerGroup) {
                        this._playerGroup.visible = Math.floor(time * 10) % 2 === 0; // blink
                    }
                } else if (this._playerGroup) {
                    this._playerGroup.visible = true;
                }

                // Power-up timers
                if (this._magnetActive) {
                    this._magnetTimer -= delta;
                    if (this._magnetTimer <= 0) this._magnetActive = false;
                }
                if (this._boostActive) {
                    this._boostTimer -= delta;
                    if (this._boostTimer <= 0) this._boostActive = false;
                }

                // Footstep sounds while running on ground
                if (!this._jumping && !this._sliding && !this._gameOver) {
                    this._footstepTimer -= delta;
                    if (this._footstepTimer <= 0) {
                        this._footstepTimer = 0.22;
                        this._playFootstepSound();
                    }
                }

                this._updateGroundPhase(delta, time, scrollDist);

                // Update animation
                if (this._capyMixer) {
                    this._capyMixer.update(delta);
                    if (this._capyRunAction) {
                        this._capyRunAction.timeScale = 1.2 + (effectiveSpeed - this._baseSpeed) * 0.08;
                    }
                }

                // Update HUD
                this._updateHUD();
            }

            /* ── Ground phase update ── */
            _updateGroundPhase(delta, time, scrollDist) {
                // Lane transition — smooth lerp for stutter-free movement
                const targetX = this._lanes[this._targetLane];
                this._currentLane = this._targetLane;
                const lerpFactor = 1 - Math.pow(0.001, delta); // frame-rate independent exponential smoothing
                this._playerX = THREE.MathUtils.lerp(this._playerX, targetX, lerpFactor);
                if (Math.abs(this._playerX - targetX) < 0.01) this._playerX = targetX;

                // Jump physics
                if (this._jumping) {
                    this._playerVY += this._gravity * delta;
                    this._playerY += this._playerVY * delta;
                    if (this._playerY <= this._groundY) {
                        this._playerY = this._groundY;
                        this._playerVY = 0;
                        this._jumping = false;
                    }
                }

                // Slide timer
                if (this._sliding) {
                    this._slideTimer += delta;
                    if (this._slideTimer >= this._slideDuration) {
                        this._sliding = false;
                        this._slideTimer = 0;
                    }
                }

                // Update player
                if (this._playerGroup) {
                    this._playerGroup.position.x = this._playerX;
                    this._playerGroup.position.y = this._playerY;
                    // Slide: squish vertically
                    const scaleY = this._sliding ? 0.5 : 1;
                    this._playerGroup.scale.y = THREE.MathUtils.lerp(this._playerGroup.scale.y, scaleY, delta * 15);
                    // Bob when running on ground
                    if (!this._jumping && !this._sliding) {
                        this._playerGroup.position.y += Math.sin(time * 14) * 0.015;
                    }
                }

                // Shield force field
                this._updateShieldBubble(delta, time);

                // Contact shadow
                if (this._contactShadow) {
                    this._contactShadow.position.x = this._playerX;
                    this._contactShadow.position.z = 0;
                    const shadowScale = Math.max(0.3, 1 - this._playerY * 0.15);
                    this._contactShadow.scale.setScalar(shadowScale);
                    this._contactShadow.material.opacity = 0.25 * shadowScale;
                }

                // Move ground tiles
                for (const tile of this._groundTiles) {
                    tile.position.z += scrollDist;
                    if (tile.position.z > 100) tile.position.z -= 300;
                }
                // Move procedural road fallbacks (if GLB hasn't loaded yet)
                for (const tile of this._pathTiles) {
                    tile.position.z += scrollDist;
                    if (tile.position.z > 100) tile.position.z -= 300;
                }

                // Move GLB road tiles
                if (this._roadGLBTiles) {
                    for (const rt of this._roadGLBTiles) {
                        rt.mesh.position.z += scrollDist;
                        if (rt.mesh.position.z > rt.length) {
                            rt.mesh.position.z -= rt.length * this._roadGLBTiles.length;
                        }
                    }
                }

                // Move lane dividers
                if (this._laneDividers) {
                    for (const d of this._laneDividers) {
                        d.position.z += scrollDist;
                        if (d.position.z > 15) d.position.z -= 130;
                    }
                }

                // Move shoulder tiles
                if (this._shoulderTiles) {
                    for (const s of this._shoulderTiles) {
                        s.position.z += scrollDist;
                        if (s.position.z > 100) s.position.z -= 300;
                    }
                }

                // Move edge lines
                if (this._edgeLines) {
                    for (const e of this._edgeLines) {
                        e.position.z += scrollDist;
                        if (e.position.z > 100) e.position.z -= 300;
                    }
                }

                // Move trees
                for (const tree of this._sideTrees) {
                    tree.position.z += scrollDist;
                    if (tree.position.z > 15) tree.position.z -= 148;
                }

                // Move bushes
                if (this._sideBushes) {
                    for (const b of this._sideBushes) {
                        b.position.z += scrollDist;
                        if (b.position.z > 15) b.position.z -= 148;
                    }
                }

                // Move flowers
                for (const f of this._sideFlowers) {
                    f.position.z += scrollDist;
                    if (f.position.z > 15) f.position.z -= 148;
                }

                // Move grass tufts
                if (this._grassTufts) {
                    for (const g of this._grassTufts) {
                        g.position.z += scrollDist;
                        if (g.position.z > 15) g.position.z -= 148;
                    }
                }

                // Spawn timers — progressive difficulty
                this._obstacleTimer += delta;
                // Phase 0: 1.6s, Phase 1: 1.2s, Phase 2: 0.9s, Phase 3: 0.65s
                const obsIntervals = [1.6, 1.2, 0.9, 0.65];
                const obsInterval = obsIntervals[this._difficultyPhase] || 0.65;
                if (this._obstacleTimer >= obsInterval) {
                    this._obstacleTimer = 0;
                    this._spawnObstacle();
                    // Phase 2+: chance of double obstacle in different lanes
                    if (this._difficultyPhase >= 2 && Math.random() < 0.3) {
                        this._spawnObstacle();
                    }
                }

                this._coinTimer += delta;
                const coinInterval = this._difficultyPhase >= 2 ? 0.7 : 0.9;
                if (this._coinTimer >= coinInterval) {
                    this._coinTimer = 0;
                    this._spawnCoinGroup();
                }

                this._powerUpTimer += delta;
                // More power-ups at higher difficulty to compensate
                const puInterval = this._difficultyPhase >= 2 ? 10 + Math.random() * 8 : 15 + Math.random() * 10;
                if (this._powerUpTimer >= puInterval) {
                    this._powerUpTimer = 0;
                    this._spawnPowerUp();
                }

                // Move obstacles + collision
                const playerH = this._sliding ? 0.2 : 0.55;
                for (let i = this._obstacles.length - 1; i >= 0; i--) {
                    const obs = this._obstacles[i];
                    obs.position.z += scrollDist;

                    // Collision
                    if (this._playerGroup && this._invincibleTimer <= 0) {
                        const dx = Math.abs(obs.position.x - this._playerX);
                        const dz = Math.abs(obs.position.z);
                        if (dx < 0.7 && dz < 0.6) {
                            const isGround = obs.userData.type === 'ground';
                            const isOverhead = obs.userData.type === 'overhead';
                            let hit = false;
                            // Ground obstacles: must jump over (playerY > 0.6 clears it)
                            if (isGround) hit = this._playerY < 0.6;
                            // Overhead obstacles: must slide under
                            if (isOverhead) hit = !this._sliding;
                            if (hit) {
                                if (this._boostActive) {
                                    this._scene.remove(obs);
                                    this._obstacles.splice(i, 1);
                                    continue;
                                }
                                this._handleHit();
                                if (this._gameOver) return;
                                this._scene.remove(obs);
                                this._obstacles.splice(i, 1);
                                continue;
                            }
                        }
                    }

                    if (obs.position.z > 12) {
                        this._scene.remove(obs);
                        this._obstacles.splice(i, 1);
                    }
                }

                // Move coins + collection
                const magnetRange = this._magnetActive ? 5 : 0;
                for (let i = this._coinObjects.length - 1; i >= 0; i--) {
                    const coin = this._coinObjects[i];
                    coin.position.z += scrollDist;
                    // Spin the coin (works for both Mesh and Object3D/Group)
                    if (coin.rotation) coin.rotation.y += delta * 5;

                    // Magnet attraction
                    if (this._magnetActive) {
                        const dx = this._playerX - coin.position.x;
                        const dy = (this._playerY + 0.3) - coin.position.y;
                        const dz = -coin.position.z;
                        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                        if (dist < magnetRange) {
                            coin.position.x += dx * delta * 6;
                            coin.position.y += dy * delta * 6;
                            coin.position.z += dz * delta * 3;
                        }
                    }

                    // Collection check
                    const dx = Math.abs(coin.position.x - this._playerX);
                    const dy = Math.abs(coin.position.y - (this._playerY + 0.3));
                    const dz = Math.abs(coin.position.z);
                    if (dx < 0.7 && dy < 0.7 && dz < 0.8) {
                        this._coinCount++;
                        this._playCoinSound();
                        this._scene.remove(coin);
                        this._coinObjects.splice(i, 1);
                        continue;
                    }

                    if (coin.position.z > 12) {
                        this._scene.remove(coin);
                        this._coinObjects.splice(i, 1);
                    }
                }

                // Move power-ups + collection
                for (let i = this._powerUpObjects.length - 1; i >= 0; i--) {
                    const pu = this._powerUpObjects[i];
                    pu.position.z += scrollDist;
                    // Spin
                    pu.children[0].rotation.y += delta * 3;
                    pu.children[0].rotation.x += delta * 1.5;
                    if (pu.children[1]) pu.children[1].rotation.z += delta * 2;

                    // Collection
                    const dx = Math.abs(pu.position.x - this._playerX);
                    const dz = Math.abs(pu.position.z);
                    if (dx < 1.0 && dz < 1.0) {
                        this._activatePowerUp(pu.userData.type);
                        this._playPowerUpSound();
                        this._scene.remove(pu);
                        this._powerUpObjects.splice(i, 1);
                        continue;
                    }

                    if (pu.position.z > 12) {
                        this._scene.remove(pu);
                        this._powerUpObjects.splice(i, 1);
                    }
                }
            }

            /* ── Hit handling ── */
            _handleHit() {
                if (this._shieldActive) {
                    this._shieldActive = false;
                    this._invincibleTimer = 1.0;
                    return;
                }
                this._lives--;
                this._playHitSound();
                if (this._lives <= 0) {
